<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3a2012" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="肌癒員工指南" />
  <title>員工作業指南｜肌·癒皮膚管理中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0ebe1; --bg-soft: #e6dfd0; --card: #faf6ec;
      --ink: #3a2012; --ink-mid: #6b3d2e; --ink-soft: #8a7560;
      --brown-light: #9c6b52; --brown-pale: #c4a48a;
      --line: #d4c8b3; --line-soft: #e5dcc8;
      --accent: #b8804a; --done: #5a7050; --warn: #c9621f;
      --pending: #b8a896; --post: #9c6060; --post-bg: rgba(156,96,96,0.07);
      --lv1: #c4a48a; --lv2: #b08060; --lv3: #8a5a3a; --lv4: #5c2e1a;
      /* 9 支膠囊代表色（同 PDF 配色語感） */
      --tx: #a68457; --wr: #6d4a36; --pi: #c08484;
      --tr: #7a9078; --wh: #b89048; --rd: #d4a8a8;
      --se: #889ba5; --hy: #7ba6c6; --po: #8aa088;
      --tc: "Noto Serif TC", "Songti TC", serif;
      --en: "Cormorant Garamond", "Noto Serif TC", serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--tc); font-size: 15px; line-height: 1.7; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
    body { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    #view { flex: 1; }

    /* Back bar */
    .back-bar { background: var(--ink); color: var(--bg); display: flex; align-items: center; font-size: 11px; letter-spacing: 0.3em; border-bottom: 1px solid rgba(196,164,138,0.2); }
    .back-bar a { color: inherit; text-decoration: none; padding: 12px 16px; display: flex; align-items: center; gap: 8px; transition: background 160ms; }
    .back-bar a:hover, .back-bar a:active { background: rgba(196,164,138,0.08); }
    .back-arr { font-family: var(--en); font-size: 14px; color: var(--brown-pale); }
    .back-en { font-family: var(--en); letter-spacing: 0.25em; color: var(--brown-pale); font-size: 10px; }

    /* Hero */
    .hero { background: var(--ink); padding: 36px 28px 32px; text-align: center; position: relative; overflow: hidden; }
    .hero-tall { padding: 56px 28px 48px; }
    .hero::before { content: ''; position: absolute; top: -40px; right: -40px; width: 180px; height: 180px; border-radius: 50%; background: rgba(196,164,138,0.08); }
    .hero::after { content: ''; position: absolute; bottom: -30px; left: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(196,164,138,0.06); }
    .hero-en { font-family: var(--en); font-size: 11px; letter-spacing: 0.35em; text-indent: 0.35em; color: var(--brown-pale); text-transform: uppercase; margin-bottom: 12px; position: relative; z-index: 1; }
    .hero-title { font-size: 22px; font-weight: 500; letter-spacing: 0.2em; text-indent: 0.2em; color: var(--bg); margin: 0 0 6px; position: relative; z-index: 1; }
    .hero-title.big { font-size: 26px; }
    .hero-orn { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 14px 0 6px; position: relative; z-index: 1; }
    .hero-orn::before, .hero-orn::after { content: ''; width: 50px; height: 1px; background: rgba(196,164,138,0.4); }
    .diamond { width: 4px; height: 4px; background: var(--brown-pale); transform: rotate(45deg); }
    .hero-sub { font-size: 11px; letter-spacing: 0.28em; color: var(--brown-pale); position: relative; z-index: 1; }

    /* Home */
    .home-main { padding: 28px 16px 40px; }
    .sec-hd { display: flex; align-items: center; gap: 10px; margin: 0 4px 14px; }
    .sec-num { font-family: var(--en); font-size: 10px; font-style: italic; color: var(--brown-pale); letter-spacing: 0.1em; }
    .sec-title { font-size: 12px; font-weight: 600; letter-spacing: 0.22em; color: var(--ink-mid); }
    .sec-line { flex: 1; height: 1px; background: var(--line); }
    .sec-count { font-family: var(--en); font-size: 11px; color: var(--brown-pale); }

    .entries { display: flex; flex-direction: column; gap: 14px; margin-bottom: 36px; }
    .entry { display: block; background: var(--card); border: 1px solid var(--line); border-radius: 6px; padding: 26px 22px; text-decoration: none; color: inherit; position: relative; overflow: hidden; transition: all 200ms; }
    .entry::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--brown-pale); transition: width 200ms; }
    .entry:hover, .entry:active { background: var(--bg-soft); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(58,32,18,0.08); }
    .entry:hover::before, .entry:active::before { width: 5px; }
    .entry-grid { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 16px; }
    .entry-en { font-family: var(--en); font-size: 11px; letter-spacing: 0.2em; color: var(--brown-light); text-transform: uppercase; margin-bottom: 6px; }
    .entry-title { font-size: 20px; font-weight: 600; letter-spacing: 0.18em; text-indent: 0.18em; color: var(--ink); margin-bottom: 10px; }
    .entry-desc { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.06em; line-height: 1.75; }
    .entry-count { font-family: var(--en); font-size: 32px; font-weight: 500; color: var(--ink-mid); line-height: 1; text-align: center; padding-left: 14px; border-left: 1px solid var(--line); }
    .entry-count-u { display: block; font-size: 9px; letter-spacing: 0.25em; color: var(--brown-pale); margin-top: 4px; font-family: var(--tc); font-weight: 400; }
    .entry-sens::before { background: var(--post); }
    .entry-sens .entry-en { color: var(--post); }

    .ref-card { display: block; background: var(--bg-soft); border: 1px dashed var(--line); border-radius: 6px; padding: 16px 18px 16px 20px; text-decoration: none; color: inherit; margin-bottom: 36px; transition: all 180ms; }
    .ref-card:hover, .ref-card:active { background: var(--card); }
    .ref-tag { display: inline-block; font-family: var(--en); font-size: 9px; font-style: italic; letter-spacing: 0.2em; color: var(--brown-light); border: 1px solid var(--brown-light); padding: 2px 7px; border-radius: 2px; margin-bottom: 8px; }
    .ref-inner { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 14px; }
    .ref-name { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; color: var(--ink); margin-bottom: 3px; }
    .ref-desc { font-size: 10px; color: var(--ink-soft); letter-spacing: 0.04em; line-height: 1.6; }
    .ref-arr { font-family: var(--en); font-size: 18px; color: var(--brown-light); }

    .pholder { background: transparent; border: 1px dashed var(--line); border-radius: 6px; padding: 18px 20px; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 14px; opacity: 0.75; margin-bottom: 10px; }
    .ph-name { font-size: 13px; font-weight: 500; letter-spacing: 0.1em; color: var(--ink-mid); margin-bottom: 3px; }
    .ph-desc { font-size: 10px; color: var(--ink-soft); letter-spacing: 0.04em; }
    .ph-tag { font-size: 9px; letter-spacing: 0.25em; padding: 4px 9px; border-radius: 2px; background: var(--bg); color: var(--brown-pale); border: 1px solid var(--line); white-space: nowrap; }

    /* Category */
    .cat-intro { margin: 16px 16px 0; background: var(--card); border: 1px solid var(--line); border-radius: 6px; padding: 12px 16px; font-size: 11px; color: var(--ink-soft); line-height: 1.8; letter-spacing: 0.05em; text-align: center; }
    .cat-intro em { font-style: normal; color: var(--ink-mid); font-weight: 500; }

    .pbar { background: var(--bg-soft); padding: 12px 20px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .pbar-label { font-size: 11px; letter-spacing: 0.15em; color: var(--ink-mid); }
    .pbar-label strong { font-family: var(--en); font-size: 16px; font-weight: 600; color: var(--ink); padding: 0 2px; }
    .pbar-track { flex: 1; height: 2px; background: var(--line-soft); position: relative; max-width: 180px; }
    .pbar-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--ink-mid); }

    .cat-sec { padding: 24px 16px 0; }
    .cat-sec-last { padding-bottom: 24px; }

    /* Theme groups */
    .tgrp { margin-bottom: 16px; }
    .tgrp:last-child { margin-bottom: 0; }
    .tgrp-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .tgrp-label { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; color: var(--ink-mid); }
    .tgrp-line { flex: 1; height: 1px; background: var(--line-soft); }

    /* Course cards */
    .clist { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
    .cc { background: var(--card); border: 1px solid var(--line); border-radius: 6px; position: relative; overflow: hidden; transition: all 180ms; }
    .cc a, .cc .inner { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; padding: 14px 16px 14px 20px; text-decoration: none; color: inherit; }
    .cc::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--pending); }
    .cc.done::before { background: var(--done); }
    .cc.done:hover, .cc.done:active { background: var(--bg-soft); transform: translateY(-1px); }
    .cc.lv1::before { background: var(--lv1); }
    .cc.lv2::before { background: var(--lv2); }
    .cc.lv3::before { background: var(--lv3); }
    .cc.lv4::before { background: var(--lv4); }
    .cc.is-post::before { background: var(--post); }
    .cc.is-post { background: var(--post-bg); }
    .cc.premium::before { background: var(--ink-mid); }

    .cbody { min-width: 0; }
    .cmeta-en { font-family: var(--en); font-size: 10px; letter-spacing: 0.15em; color: var(--brown-light); margin-bottom: 3px; text-transform: uppercase; }
    .cmeta-tc { font-family: var(--tc); font-size: 10px; letter-spacing: 0.12em; color: var(--brown-light); margin-bottom: 3px; }
    .cc.premium .cmeta-tc,
    .cc[data-tier="basic"] .cmeta-tc,
    .cc[data-tier="mid"] .cmeta-tc { font-size: 13px; letter-spacing: 0.18em; text-indent: 0.18em; font-weight: 600; margin-bottom: 5px; }
    .cc.lv1 .cmeta-tc { color: var(--lv1); }
    .cc.lv2 .cmeta-tc { color: var(--lv2); }
    .cc.lv3 .cmeta-tc { color: var(--lv3); }
    .cc.lv4 .cmeta-tc { color: var(--lv4); font-weight: 500; }
    .cc.is-post .cmeta-tc { color: var(--post); }
    .cc.premium .cmeta-tc { color: var(--ink-mid); font-weight: 600; }
    .cname { font-size: 14px; font-weight: 600; letter-spacing: 0.06em; color: var(--ink); }
    .cdesc { font-size: 10px; color: var(--ink-soft); letter-spacing: 0.04em; margin-top: 3px; line-height: 1.6; }
    .schip { flex-shrink: 0; font-size: 10px; letter-spacing: 0.2em; padding: 5px 10px; border-radius: 2px; white-space: nowrap; font-weight: 500; }
    .sp { background: var(--bg); color: var(--pending); border: 1px solid var(--line); }
    .sd { background: var(--done); color: var(--bg); }
    .sd::after { content: " →"; font-family: var(--en); font-weight: 600; }

    /* SOP */
    .sop-hero { padding: 36px 24px 28px; text-align: center; background: linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%); border-bottom: 1px solid var(--line); }
    .sop-kicker { font-size: 11px; letter-spacing: 0.4em; text-indent: 0.4em; color: var(--ink-mid); margin-bottom: 18px; }
    .sop-title { font-family: var(--tc); font-weight: 500; font-size: 26px; letter-spacing: 0.12em; color: var(--ink); margin: 0 0 6px; line-height: 1.3; }
    .sop-en { font-family: var(--en); font-style: italic; font-size: 14px; color: var(--ink-mid); letter-spacing: 0.08em; margin-bottom: 22px; }
    .sop-meta { display: flex; justify-content: center; gap: 24px; margin: 18px 0 20px; }
    .mbox { display: flex; flex-direction: column; align-items: center; }
    .mnum { font-family: var(--en); font-size: 34px; font-weight: 500; color: var(--ink); line-height: 1; margin-bottom: 4px; }
    .munit { font-size: 10px; letter-spacing: 0.3em; text-indent: 0.3em; color: var(--ink-mid); }
    .mdiv { width: 1px; background: var(--line); align-self: stretch; }
    .sop-note { font-size: 13px; color: var(--ink-mid); margin: 8px auto 0; max-width: 320px; padding-top: 16px; border-top: 1px solid var(--line); line-height: 1.7; }
    .sop-note strong { color: var(--ink); font-weight: 500; }

    .toolbar { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--line); z-index: 10; padding: 10px 16px 12px; backdrop-filter: blur(6px); }
    .toolbar .pbar-track { max-width: none; margin-bottom: 10px; }
    .toolbar .pbar-fill { transition: width 320ms; }
    .tbar-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .btn-g { background: transparent; border: 1px solid var(--line); color: var(--ink-mid); font-family: var(--tc); font-size: 12px; letter-spacing: 0.15em; padding: 6px 12px; cursor: pointer; border-radius: 1px; transition: all 160ms; }
    .btn-g:hover, .btn-g:active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    .steps { padding: 20px 16px 40px; }
    .step { background: var(--card); border: 1px solid var(--line); margin-bottom: 14px; transition: opacity 220ms; }
    .step.done { opacity: 0.55; }
    .step.done .step-title { text-decoration: line-through; text-decoration-color: var(--ink-soft); }
    .step-hd { display: grid; grid-template-columns: auto auto 1fr auto; align-items: center; gap: 12px; padding: 16px; cursor: pointer; user-select: none; }
    .snum { font-family: var(--en); font-size: 26px; font-weight: 500; color: var(--ink-mid); min-width: 28px; text-align: center; line-height: 1; }
    .step.done .snum { color: var(--done); }
    .schk { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border: 1.5px solid var(--ink-mid); border-radius: 50%; background: transparent; cursor: pointer; transition: all 180ms; }
    .schk:hover { border-color: var(--ink); }
    .schk.on { background: var(--ink); border-color: var(--ink); }
    .schk.on::after { content: ""; width: 8px; height: 4px; border-left: 1.5px solid var(--bg); border-bottom: 1.5px solid var(--bg); transform: rotate(-45deg) translate(1px, -1px); }
    .sbody { min-width: 0; }
    .step-title { font-size: 16px; font-weight: 500; color: var(--ink); margin: 0 0 4px; letter-spacing: 0.06em; }
    .smeta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .chip { font-size: 11px; letter-spacing: 0.1em; color: var(--ink-mid); padding: 2px 8px; border: 1px solid var(--line); background: var(--bg); white-space: nowrap; }
    .ct { font-family: var(--en); font-size: 13px; letter-spacing: 0.05em; }
    .cprep { background: var(--bg-soft); }
    .cbr { background: transparent; }
    .cwarn { background: rgba(201,98,31,0.06); color: var(--warn); border-color: rgba(201,98,31,0.25); }
    .exp { background: transparent; border: none; color: var(--ink-mid); font-size: 16px; width: 24px; height: 24px; cursor: pointer; transition: transform 200ms; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
    .step.open .exp { transform: rotate(180deg); }
    .sdet { display: none; border-top: 1px solid var(--line-soft); padding: 4px 16px 18px; }
    .step.open .sdet { display: block; }
    .sblk { padding: 16px 0; border-bottom: 1px dotted var(--line); }
    .sblk:last-child { border-bottom: none; padding-bottom: 4px; }
    .stitle { display: flex; align-items: center; gap: 10px; font-size: 11px; letter-spacing: 0.3em; text-indent: 0.3em; color: var(--ink-mid); margin: 0 0 10px; font-weight: 500; }
    .stitle::before { content: ""; width: 14px; height: 1px; background: var(--ink-mid); }
    .plist { list-style: none; padding: 0; margin: 0; }
    .plist li + li { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line-soft); }
    .pname { font-weight: 500; color: var(--ink); font-size: 14px; }
    .pdesc { font-size: 12.5px; color: var(--ink-mid); margin-top: 3px; line-height: 1.6; }
    .pdose { font-family: var(--en); font-size: 12px; color: var(--ink-soft); margin-top: 3px; }
    .pdose::before { content: "· "; }
    .mblock { margin-top: 10px; padding: 12px 14px; background: var(--bg); border-left: 2px solid var(--ink-mid); font-size: 13px; color: var(--ink); line-height: 1.8; white-space: pre-line; }
    .mblock strong { display: block; font-size: 10px; letter-spacing: 0.3em; color: var(--ink-mid); margin-bottom: 4px; font-weight: 500; }
    .mblock.wn { border-left-color: var(--warn); }
    .btabs { display: flex; margin-bottom: 14px; border: 1px solid var(--line); }
    .btab { flex: 1; background: transparent; border: none; border-right: 1px solid var(--line); padding: 10px 8px; font-family: var(--tc); font-size: 12px; color: var(--ink-mid); cursor: pointer; letter-spacing: 0.08em; transition: all 160ms; }
    .btab:last-child { border-right: none; }
    .btab.on { background: var(--ink); color: var(--bg); }
    .btab-sub { display: block; font-size: 9px; letter-spacing: 0.25em; color: var(--ink-soft); margin-top: 2px; }
    .btab.on .btab-sub { color: var(--bg-soft); }
    .bbody { display: none; }
    .bbody.on { display: block; }
    .todo-box { border: 1px dashed var(--line); padding: 14px; color: var(--ink-soft); font-size: 12.5px; line-height: 1.7; background: var(--bg); }
    .todo-tag { display: inline-block; font-size: 9px; letter-spacing: 0.3em; padding: 2px 8px; color: var(--ink-soft); border: 1px solid var(--ink-soft); margin-right: 8px; vertical-align: middle; }
    .tw { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--bg-soft); border: 1px solid var(--line); margin-bottom: 16px; transition: background 240ms, border-color 240ms; }
    .tw.run { background: #f5e8d5; border-color: var(--accent); }
    .tw.fin { background: #e8dcc3; border-color: var(--warn); animation: pulse 1.2s ease infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.65; } }
    .tdisp { font-family: var(--en); font-size: 24px; font-weight: 500; color: var(--ink); min-width: 72px; letter-spacing: 0.04em; font-variant-numeric: tabular-nums; }
    .tw.fin .tdisp { color: var(--warn); }
    .tctrl { display: flex; gap: 6px; margin-left: auto; }
    .tb { background: var(--card); border: 1px solid var(--line); color: var(--ink); font-family: var(--tc); font-size: 11px; letter-spacing: 0.15em; padding: 6px 10px; cursor: pointer; transition: all 160ms; }
    .tb:hover:not(:disabled) { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .tb:disabled { opacity: 0.35; cursor: not-allowed; }
    .no-timer { font-size: 12px; color: var(--ink-soft); padding: 8px 0; font-style: italic; }

    .ref-bot { background: var(--bg-soft); padding: 36px 20px 28px; border-top: 1px solid var(--line); margin-top: 8px; }
    .rt { font-family: var(--tc); font-size: 15px; font-weight: 500; color: var(--ink); letter-spacing: 0.2em; text-indent: 0.2em; margin: 0 0 14px; padding-bottom: 10px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; justify-content: space-between; }
    .rt:not(:first-child) { margin-top: 32px; }
    .rt-en { font-family: var(--en); font-style: italic; font-size: 12px; color: var(--ink-soft); letter-spacing: 0.05em; font-weight: 400; text-indent: 0; }
    .psumm, .isumm { list-style: none; padding: 0; margin: 0; }
    .psumm li, .isumm li { padding: 10px 0; border-bottom: 1px dotted var(--line); font-size: 13.5px; color: var(--ink); }
    .psumm li:last-child, .isumm li:last-child { border-bottom: none; }
    .pt { display: inline-block; font-family: var(--en); font-size: 11px; color: var(--ink-soft); margin-right: 8px; min-width: 24px; }

    .empty { margin: 40px 20px; padding: 40px 24px; background: var(--card); border: 1px dashed var(--line); border-radius: 6px; text-align: center; }
    .empty-icon { font-family: var(--en); font-size: 28px; font-style: italic; color: var(--brown-pale); margin-bottom: 16px; }
    .empty-title { font-size: 15px; font-weight: 600; letter-spacing: 0.15em; color: var(--ink-mid); margin-bottom: 10px; }
    .empty-desc { font-size: 12px; color: var(--ink-soft); line-height: 1.8; letter-spacing: 0.04em; }

    /* ============ HANDBOOK ============ */
    .hb-main { padding: 28px 16px 40px; }
    .hb-section { margin-bottom: 40px; }
    .hb-section:last-of-type { margin-bottom: 24px; }
    .hb-h2 {
      font-family: var(--tc); font-size: 14px; font-weight: 600;
      letter-spacing: 0.25em; text-indent: 0.25em; color: var(--ink);
      margin: 0 0 16px; padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: baseline; justify-content: space-between;
    }
    .hb-lead {
      font-size: 14px; line-height: 1.85; color: var(--ink-mid);
      margin: 0 0 8px; padding: 14px 16px;
      background: var(--card); border-left: 2px solid var(--ink-mid);
    }
    .hb-list { list-style: none; padding: 0; margin: 8px 0 0; }
    .hb-list li {
      position: relative; padding: 6px 0 6px 18px;
      font-size: 13px; line-height: 1.75; color: var(--ink);
      border-bottom: 1px dotted var(--line-soft);
    }
    .hb-list li:last-child { border-bottom: none; }
    .hb-list li::before {
      content: '·'; position: absolute; left: 4px; top: 6px;
      color: var(--brown-pale); font-size: 18px; line-height: 1;
    }
    .hb-list-strong li { padding-top: 8px; padding-bottom: 8px; font-size: 13.5px; }

    /* Tables */
    .hb-table {
      width: 100%; border-collapse: collapse; margin: 12px 0;
      font-size: 12.5px; line-height: 1.6;
      background: var(--card); border: 1px solid var(--line);
    }
    .hb-table th {
      background: var(--bg-soft);
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.15em; color: var(--ink-mid);
      padding: 8px 10px; text-align: left;
      border-bottom: 1px solid var(--line);
    }
    .hb-table td {
      padding: 8px 10px; border-bottom: 1px solid var(--line-soft);
      color: var(--ink); vertical-align: top;
    }
    .hb-table tbody tr:last-child td { border-bottom: none; }
    .hb-flow-table .hb-tdr-step {
      font-family: var(--en); font-weight: 600; color: var(--ink-mid);
      letter-spacing: 0.05em; white-space: nowrap; width: 60px;
    }
    .hb-flow-table .hb-tdr-name {
      font-weight: 600; color: var(--ink);
      letter-spacing: 0.06em; width: 90px; white-space: nowrap;
    }
    .hb-flow-table .hb-tdr-desc { color: var(--ink-soft); font-size: 12px; }
    .hb-tag-table .hb-tag-cell {
      font-family: var(--en); font-weight: 600;
      color: var(--ink-mid); letter-spacing: 0.05em;
      white-space: nowrap; width: 90px;
    }
    .hb-tag-table .hb-tag-meta {
      font-size: 11px; color: var(--ink-soft);
      white-space: nowrap;
    }
    .hb-capsule-table .hb-cap-name {
      font-weight: 600; color: var(--ink);
      letter-spacing: 0.05em; white-space: nowrap; width: 90px;
    }

    /* Step block */
    .hb-step {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 6px; padding: 18px 18px 14px;
      margin-bottom: 14px; position: relative;
    }
    .hb-step::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--brown-pale);
      border-radius: 6px 0 0 6px;
    }
    .hb-step-hd {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 10px; padding-bottom: 10px;
      border-bottom: 1px solid var(--line-soft);
    }
    .hb-step-num {
      font-family: var(--en); font-size: 22px; font-weight: 500;
      color: var(--ink-mid); line-height: 1; min-width: 24px;
    }
    .hb-step-title {
      font-size: 15px; font-weight: 600; letter-spacing: 0.08em;
      color: var(--ink); margin: 0; line-height: 1.4;
    }
    .hb-step-sub {
      font-size: 11px; color: var(--ink-soft);
      letter-spacing: 0.05em; font-weight: 400;
      margin-left: 6px;
    }
    .hb-step-body {
      font-size: 13px; line-height: 1.8; color: var(--ink-mid);
      margin: 0 0 10px;
    }

    .hb-subt {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.2em; text-indent: 0.2em;
      color: var(--ink-mid); margin: 16px 0 8px;
      padding-left: 10px; border-left: 2px solid var(--brown-pale);
    }

    .hb-script {
      background: var(--bg-soft);
      border-left: 2px solid var(--accent);
      padding: 10px 14px; margin: 8px 0;
      font-size: 13px; line-height: 1.85;
      color: var(--ink); font-family: var(--tc);
      font-style: normal; quotes: none;
    }
    .hb-note {
      background: var(--bg);
      border: 1px dashed var(--line);
      padding: 10px 14px; margin: 8px 0;
      font-size: 12px; line-height: 1.75;
      color: var(--ink-soft); letter-spacing: 0.02em;
    }
    .hb-warn {
      background: rgba(201,98,31,0.06);
      border: 1px solid rgba(201,98,31,0.2);
      border-left: 2px solid var(--warn);
      padding: 10px 14px; margin: 8px 0;
      font-size: 12.5px; line-height: 1.75;
      color: var(--ink); font-weight: 500;
    }
    .hb-dialog { margin: 8px 0; }
    .hb-dialog-q {
      font-size: 12px; color: var(--ink-soft);
      padding: 6px 14px;
      background: var(--card);
      border-left: 2px solid var(--line);
    }
    .hb-dialog-a {
      font-size: 13px; color: var(--ink);
      padding: 8px 14px;
      background: var(--bg-soft);
      border-left: 2px solid var(--accent);
      margin-top: 4px;
    }
    .hb-btn-info {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 12px 14px; margin: 10px 0;
    }
    .hb-btn-info-hd {
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.06em; color: var(--ink);
      margin-bottom: 4px;
    }
    .hb-btn-info .hb-list { margin-top: 4px; }

    .hb-scenario {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 4px; padding: 14px 16px; margin-bottom: 10px;
    }
    .hb-scenario .hb-subt {
      margin-top: 0; padding-left: 0;
      border-left: none; color: var(--ink);
      font-size: 12.5px;
    }

    .hb-footer-line {
      text-align: center;
      font-size: 11px; letter-spacing: 0.25em;
      color: var(--brown-pale);
      padding: 24px 0 8px;
      border-top: 1px solid var(--line);
      margin-top: 32px;
    }

    /* ============ EQUIPMENT ============ */
    .eq-machine {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 6px; padding: 20px 18px;
      margin-bottom: 24px; position: relative; overflow: hidden;
    }
    .eq-machine::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--accent);
    }
    .eq-hd {
      display: flex; gap: 14px; align-items: flex-start;
      padding-bottom: 16px; margin-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }
    .eq-cover {
      width: 100px; height: auto; flex-shrink: 0;
      border-radius: 4px; border: 1px solid var(--line);
      background: #fff;
    }
    .eq-name-block { min-width: 0; flex: 1; }
    .eq-name {
      font-family: var(--en);
      font-size: 22px; font-weight: 600;
      letter-spacing: 0.15em; color: var(--ink);
      margin: 0 0 4px; line-height: 1.1;
    }
    .eq-name-tc {
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.1em; color: var(--ink-mid);
      margin-bottom: 8px;
    }
    .eq-tagline {
      font-size: 11.5px; line-height: 1.7;
      color: var(--brown-light); letter-spacing: 0.04em;
    }
    .eq-intro {
      font-size: 13px; line-height: 1.85; color: var(--ink-mid);
      padding: 12px 14px; background: var(--bg-soft);
      border-left: 2px solid var(--accent);
      margin-bottom: 16px;
    }
    .eq-h3 {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.3em; text-indent: 0.3em;
      color: var(--ink-mid); margin: 20px 0 10px;
      padding-left: 10px; border-left: 2px solid var(--brown-pale);
    }
    .eq-main-point {
      font-size: 12.5px; line-height: 1.85;
      color: var(--ink); padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--line); border-radius: 4px;
    }
    .eq-probes { display: flex; flex-direction: column; gap: 10px; }
    .eq-probe {
      background: var(--bg);
      border: 1px solid var(--line); border-radius: 4px;
      padding: 12px 14px;
    }
    .eq-probe-name {
      font-family: var(--en); font-size: 13px; font-weight: 600;
      letter-spacing: 0.12em; color: var(--ink);
      margin-bottom: 4px;
    }
    .eq-probe-fn {
      font-size: 12px; color: var(--ink-mid);
      margin-bottom: 8px; line-height: 1.6;
    }
    .eq-probe-effects { display: flex; flex-wrap: wrap; gap: 4px; }
    .eq-effect {
      font-size: 10.5px; padding: 3px 8px;
      background: var(--bg-soft); color: var(--ink-mid);
      border: 1px solid var(--line); border-radius: 10px;
      letter-spacing: 0.04em;
    }
    .eq-probe-note {
      font-size: 10.5px; color: var(--brown-light);
      letter-spacing: 0.04em; margin-top: 6px;
      padding: 4px 8px; background: rgba(196,164,138,0.1);
      border-radius: 2px; display: inline-block;
    }
    .eq-fns { display: flex; flex-direction: column; gap: 8px; }
    .eq-fn {
      background: var(--bg);
      border: 1px solid var(--line); border-radius: 4px;
      padding: 10px 12px; position: relative;
    }
    .eq-fn-label {
      font-size: 12px; font-weight: 600;
      color: var(--ink); letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .eq-fn-desc {
      font-size: 12px; color: var(--ink-mid);
      line-height: 1.7; letter-spacing: 0.02em;
    }
    .eq-fn-detail {
      font-size: 11px; color: var(--ink-soft);
      line-height: 1.7; margin-top: 4px;
      padding-top: 4px; border-top: 1px dotted var(--line-soft);
      font-style: italic;
    }

    /* Variants list (when a tier has multiple SOPs) */
    .variant-main { padding: 24px 16px 40px; }
    .variant-intro {
      font-size: 13px; color: var(--ink-soft); line-height: 1.8;
      letter-spacing: 0.04em; text-align: center; margin: 0 0 20px;
      padding: 12px 16px; background: var(--card);
      border: 1px solid var(--line); border-radius: 6px;
    }
    .variant-list { display: flex; flex-direction: column; gap: 14px; }
    .variant-card {
      display: block; position: relative; background: var(--card);
      border: 1px solid var(--line); border-radius: 6px;
      padding: 22px 56px 22px 24px;
      text-decoration: none; color: inherit;
      transition: all 200ms;
    }
    .variant-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: var(--ink-mid); border-radius: 6px 0 0 6px;
      transition: width 200ms;
    }
    .variant-card:hover, .variant-card:active {
      background: var(--bg-soft); transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(58,32,18,0.08);
    }
    .variant-card:hover::before, .variant-card:active::before { width: 6px; }
    .variant-tag {
      display: inline-block; font-size: 9px; letter-spacing: 0.25em;
      color: var(--brown-light); border: 1px solid var(--brown-light);
      padding: 2px 8px; border-radius: 2px; margin-bottom: 10px;
      font-weight: 500;
    }
    .variant-label {
      font-size: 17px; font-weight: 600; letter-spacing: 0.1em;
      color: var(--ink); margin-bottom: 4px;
    }
    .variant-sub {
      font-family: var(--en); font-style: italic; font-size: 13px;
      color: var(--ink-mid); letter-spacing: 0.04em; margin-bottom: 4px;
    }
    .variant-meta {
      font-size: 11px; color: var(--ink-soft);
      letter-spacing: 0.04em;
    }
    .variant-arrow {
      position: absolute; right: 22px; top: 50%;
      transform: translateY(-50%);
      font-family: var(--en); font-size: 22px;
      color: var(--brown-light);
    }

    /* Upsell handbook page */
    .upsell-main { padding: 28px 16px 40px; }
    .upsell-intro {
      font-size: 12.5px; color: var(--ink-mid); line-height: 1.85;
      letter-spacing: 0.04em; text-align: center;
      padding: 14px 18px; margin: 0 0 16px;
      background: var(--card); border: 1px solid var(--line);
      border-radius: 6px;
    }
    .upsell-count {
      font-size: 11px; letter-spacing: 0.2em;
      color: var(--brown-pale); text-align: center;
      margin: 0 0 18px;
    }
    .upsell-count strong {
      font-family: var(--en); font-size: 16px; font-weight: 600;
      color: var(--ink); padding: 0 4px;
    }
    .upsell-card {
      background: var(--card); border: 1px solid var(--accent);
      border-radius: 6px; padding: 18px 20px;
      margin-bottom: 14px;
      position: relative; overflow: hidden;
    }
    .upsell-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: var(--accent);
    }
    .upsell-hd {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px;
      padding-bottom: 10px; margin-bottom: 12px;
      border-bottom: 1px solid var(--line-soft);
    }
    .upsell-hd-left { flex: 1; min-width: 0; }
    .upsell-course-name {
      font-size: 15px; font-weight: 600;
      letter-spacing: 0.08em; color: var(--ink);
      margin-bottom: 2px;
    }
    .upsell-course-meta {
      font-size: 10px; letter-spacing: 0.12em;
      color: var(--brown-light);
    }
    .upsell-price {
      font-family: var(--en); font-weight: 600;
      font-size: 17px; color: var(--accent);
      letter-spacing: 0.05em; white-space: nowrap;
    }
    .upsell-title-row {
      display: flex; align-items: baseline; flex-wrap: wrap;
      gap: 8px; margin-bottom: 10px;
    }
    .upsell-title {
      font-size: 14px; font-weight: 600;
      letter-spacing: 0.05em; color: var(--ink);
    }
    .upsell-audience {
      font-size: 10px; letter-spacing: 0.1em;
      color: var(--ink-soft);
      padding: 2px 8px; background: var(--bg-soft);
      border: 1px solid var(--line); border-radius: 2px;
    }
    .upsell-link {
      display: inline-block; margin-top: 12px;
      font-size: 11px; letter-spacing: 0.2em;
      color: var(--ink-mid); text-decoration: none;
      padding: 6px 12px; border: 1px solid var(--line);
      transition: all 160ms;
    }
    .upsell-link:hover, .upsell-link:active {
      background: var(--ink); color: var(--bg);
      border-color: var(--ink);
    }

    /* Addon upsell script card */
    .addon-card {
      background: var(--card); border: 1px solid var(--accent);
      border-radius: 6px; padding: 18px 20px;
      margin: 12px 0 4px;
      position: relative; overflow: hidden;
    }
    .addon-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: var(--accent);
    }
    .addon-hd {
      display: flex; align-items: baseline;
      justify-content: space-between; gap: 12px;
      padding-bottom: 8px; margin-bottom: 8px;
      border-bottom: 1px solid var(--line-soft);
    }
    .addon-title {
      font-size: 16px; font-weight: 600;
      letter-spacing: 0.1em; color: var(--ink);
    }
    .addon-price {
      font-family: var(--en); font-weight: 600;
      font-size: 17px; color: var(--accent);
      letter-spacing: 0.05em; white-space: nowrap;
    }
    .addon-audience {
      font-size: 11px; color: var(--ink-soft);
      letter-spacing: 0.08em; margin-bottom: 12px;
    }
    .addon-quote {
      margin: 0 0 14px; padding: 14px 16px;
      background: var(--bg-soft);
      border-left: 2px solid var(--accent);
      font-size: 14px; line-height: 1.95;
      color: var(--ink); letter-spacing: 0.02em;
      font-family: var(--tc);
      quotes: '「' '」';
    }
    .addon-quote::before { content: open-quote; color: var(--accent); font-weight: 600; }
    .addon-quote::after { content: close-quote; color: var(--accent); font-weight: 600; }
    .addon-tips-hd {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.2em; color: var(--ink-mid);
      margin-bottom: 6px; padding-left: 10px;
      border-left: 2px solid var(--brown-pale);
    }
    .addon-tips {
      list-style: none; padding: 0; margin: 0;
    }
    .addon-tips li {
      position: relative;
      padding: 6px 0 6px 14px;
      font-size: 12.5px; line-height: 1.7;
      color: var(--ink); letter-spacing: 0.02em;
      border-bottom: 1px dotted var(--line-soft);
    }
    .addon-tips li:last-child { border-bottom: none; }
    .addon-tips li::before {
      content: '·'; position: absolute; left: 2px; top: 6px;
      color: var(--accent); font-size: 16px; line-height: 1;
    }

    /* Slide gallery */
    .slide-gallery {
      display: flex; flex-direction: column; gap: 12px;
      margin: 12px 0 4px;
    }
    .slide-fig {
      margin: 0; background: var(--card);
      border: 1px solid var(--line); border-radius: 4px;
      overflow: hidden;
    }
    .slide-fig img {
      display: block; width: 100%; height: auto;
      background: #fff;
    }
    .slide-fig figcaption {
      font-size: 11px; color: var(--ink-soft);
      letter-spacing: 0.04em; padding: 8px 12px;
      border-top: 1px solid var(--line-soft);
      background: var(--bg-soft);
      text-align: center;
    }

    /* Brand intro block */
    .brand-intro {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 4px; padding: 16px 18px;
      position: relative; overflow: hidden; margin: 12px 0 4px;
    }
    .brand-intro::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--accent);
    }
    .brand-tagline {
      font-family: var(--en); font-style: italic;
      font-size: 16px; font-weight: 500;
      color: var(--ink-mid); letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .brand-body {
      font-size: 13px; line-height: 1.85;
      color: var(--ink); margin: 0 0 12px;
    }
    .brand-targets {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding-top: 10px; border-top: 1px solid var(--line-soft);
    }
    .brand-targets span {
      font-size: 11px; padding: 4px 10px;
      background: var(--bg-soft); color: var(--ink-mid);
      border: 1px solid var(--line); border-radius: 12px;
      letter-spacing: 0.05em;
    }

    /* Footer */
    footer { background: var(--ink); color: var(--bg); text-align: center; padding: 24px 20px 28px; }
    .fo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
    .fo::before, .fo::after { content: ''; width: 36px; height: 1px; background: rgba(196,164,138,0.4); }
    .fb { font-size: 13px; letter-spacing: 0.35em; text-indent: 0.35em; margin-bottom: 4px; }
    .fm { color: var(--brown-pale); font-size: 10px; letter-spacing: 0.2em; }

    @media (max-width: 360px) {
      .sop-meta { gap: 16px; } .mnum { font-size: 28px; }
      .step-hd { padding: 12px; gap: 8px; }
    }

    /* ====== STAFF PRICE ====== */
    .sp-intro { padding: 20px 22px 6px; text-align: center; font-size: 13px; color: var(--brown-light); letter-spacing: 0.08em; line-height: 1.85; }
    .sp-intro strong { color: var(--ink); font-weight: 500; }
    .sp-brand-list { padding: 8px 22px 32px; display: flex; flex-direction: column; gap: 12px; }
    .sp-brand-card { display: block; background: #fff; border: 1px solid rgba(196,164,138,0.25); border-radius: 6px; padding: 22px 22px; text-decoration: none; color: inherit; transition: all 180ms; position: relative; overflow: hidden; }
    .sp-brand-card:hover, .sp-brand-card:active { border-color: var(--brown-light); box-shadow: 0 4px 16px rgba(120,80,40,0.06); transform: translateY(-1px); }
    .sp-brand-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--brown-light); opacity: 0.6; }
    .sp-brand-en { font-family: var(--en); font-size: 10px; letter-spacing: 0.32em; text-indent: 0.32em; color: var(--brown-light); text-transform: uppercase; margin-bottom: 8px; }
    .sp-brand-name { font-size: 18px; letter-spacing: 0.18em; color: var(--ink); margin-bottom: 6px; }
    .sp-brand-note { font-size: 11px; color: var(--brown-light); letter-spacing: 0.06em; line-height: 1.7; }
    .sp-brand-arr { position: absolute; right: 22px; top: 50%; transform: translateY(-50%); font-family: var(--en); color: var(--brown-light); font-size: 18px; }

    .sp-rules { margin: 20px 22px 28px; padding: 16px 18px; background: rgba(196,164,138,0.08); border: 1px solid rgba(196,164,138,0.18); border-radius: 4px; font-size: 12px; color: var(--ink); line-height: 1.95; letter-spacing: 0.04em; }
    .sp-rules-t { font-size: 11px; letter-spacing: 0.28em; text-indent: 0.28em; color: var(--brown-light); margin-bottom: 10px; font-family: var(--en); text-transform: uppercase; }
    .sp-rules li { margin-bottom: 4px; }
    .sp-rules li:last-child { margin-bottom: 0; }

    .sp-sec { margin: 0 0 18px; padding: 0 22px; }
    .sp-sec-hd { display: flex; align-items: center; gap: 12px; margin: 22px 0 12px; padding-top: 8px; }
    .sp-sec-hd .sp-sec-title { font-size: 13px; letter-spacing: 0.14em; color: var(--ink); white-space: nowrap; }
    .sp-sec-hd .sp-sec-line { flex: 1; height: 1px; background: rgba(196,164,138,0.3); }
    .sp-tbl { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid rgba(196,164,138,0.18); border-radius: 4px; overflow: hidden; }
    .sp-tbl thead { background: var(--ink); color: var(--bg); }
    .sp-tbl th { padding: 10px 8px; font-size: 10px; letter-spacing: 0.12em; font-weight: 400; text-align: left; font-family: var(--tc); }
    .sp-tbl th.r { text-align: right; }
    .sp-tbl td { padding: 11px 8px; font-size: 12px; vertical-align: middle; border-top: 1px solid rgba(196,164,138,0.12); line-height: 1.55; }
    .sp-tbl tr:first-child td { border-top: none; }
    .sp-tbl .sp-name { color: var(--ink); }
    .sp-tbl .sp-spec { color: var(--brown-light); font-size: 11px; font-family: var(--en); letter-spacing: 0.04em; }
    .sp-tbl .sp-price-c { text-align: right; color: var(--brown-light); font-family: var(--en); font-size: 11px; text-decoration: line-through; text-decoration-color: rgba(196,164,138,0.5); }
    .sp-tbl .sp-price-s { text-align: right; color: var(--ink); font-family: var(--en); font-size: 14px; font-weight: 500; }
    .sp-tbl .sp-price-s::before { content: '$'; font-size: 10px; color: var(--brown-light); margin-right: 2px; }
    .sp-tbl tr:hover td { background: rgba(196,164,138,0.05); }

    .sp-foot { padding: 0 22px 24px; text-align: center; font-size: 10px; color: var(--brown-light); letter-spacing: 0.16em; line-height: 1.8; }

    /* ====== CARE EXTRA SOP ====== */
    .ce-intro { padding: 22px 22px 8px; font-size: 13px; line-height: 1.95; color: var(--ink); letter-spacing: 0.04em; }
    .ce-intro p { margin: 0 0 10px; }
    .ce-intro strong { color: var(--ink); font-weight: 500; }
    .ce-intro em { font-style: normal; color: var(--brown-light); }

    .ce-sec { margin: 26px 22px 0; }
    .ce-sec-hd { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .ce-sec-num { font-family: var(--en); font-size: 11px; letter-spacing: 0.2em; color: var(--brown-light); padding: 4px 8px; border: 1px solid rgba(196,164,138,0.4); border-radius: 2px; }
    .ce-sec-title { font-size: 14px; letter-spacing: 0.18em; color: var(--ink); }
    .ce-sec-line { flex: 1; height: 1px; background: rgba(196,164,138,0.25); }

    /* 觸發情境清單 */
    .ce-trigger-list { background: #fff; border: 1px solid rgba(196,164,138,0.22); border-radius: 4px; padding: 4px 0; }
    .ce-trigger { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-bottom: 1px solid rgba(196,164,138,0.12); }
    .ce-trigger:last-child { border-bottom: none; }
    .ce-trigger-no { font-family: var(--en); font-size: 11px; color: var(--brown-light); min-width: 24px; padding-top: 2px; letter-spacing: 0.1em; }
    .ce-trigger-body { flex: 1; }
    .ce-trigger-t { font-size: 13px; color: var(--ink); margin-bottom: 4px; letter-spacing: 0.04em; }
    .ce-trigger-eg { font-size: 11px; color: var(--brown-light); line-height: 1.7; }

    /* 六大分類卡片 */
    .ce-cat-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .ce-cat { background: #fff; border: 1px solid rgba(196,164,138,0.22); border-radius: 4px; padding: 14px 16px; position: relative; padding-left: 20px; }
    .ce-cat::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 2px 0 0 2px; }
    .ce-cat.r1::before { background: #d97757; }
    .ce-cat.r2::before { background: #e09b56; }
    .ce-cat.r3::before { background: #d4ba6a; }
    .ce-cat.r4::before { background: #8aa370; }
    .ce-cat.r5::before { background: #6a8db0; }
    .ce-cat.r6::before { background: #999; }
    .ce-cat-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .ce-cat-icon { font-size: 14px; }
    .ce-cat-name { font-size: 13px; color: var(--ink); letter-spacing: 0.12em; font-weight: 500; }
    .ce-cat-tag { font-family: var(--en); font-size: 9px; color: var(--brown-light); letter-spacing: 0.18em; margin-left: auto; }
    .ce-cat-row { font-size: 12px; color: var(--ink); line-height: 1.8; margin-bottom: 4px; }
    .ce-cat-row .ce-lbl { color: var(--brown-light); font-size: 10px; letter-spacing: 0.12em; display: inline-block; min-width: 56px; font-family: var(--en); }

    /* 三級框架 */
    .ce-tier { background: #fff; border: 1px solid rgba(196,164,138,0.22); border-radius: 4px; padding: 14px 16px; margin-bottom: 10px; position: relative; }
    .ce-tier-hd { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
    .ce-tier-lv { font-family: var(--en); font-size: 18px; font-weight: 500; color: var(--ink); letter-spacing: 0.06em; }
    .ce-tier-lv .ce-tier-tag { font-size: 10px; color: var(--brown-light); margin-left: 4px; letter-spacing: 0.18em; }
    .ce-tier-cost { font-size: 12px; color: var(--brown-light); font-family: var(--en); margin-left: auto; }
    .ce-tier-who { font-size: 12px; color: var(--ink); margin-bottom: 4px; letter-spacing: 0.04em; }
    .ce-tier-who strong { color: var(--brown-light); font-size: 10px; letter-spacing: 0.12em; margin-right: 6px; font-family: var(--en); }
    .ce-tier-eg { font-size: 11px; color: var(--brown-light); line-height: 1.65; }

    /* 話術範例 */
    .ce-script { background: rgba(196,164,138,0.06); border-left: 3px solid var(--brown-light); padding: 12px 14px; margin-bottom: 10px; border-radius: 0 3px 3px 0; }
    .ce-script-sit { font-size: 11px; color: var(--brown-light); letter-spacing: 0.12em; margin-bottom: 6px; }
    .ce-script-q { font-size: 12px; color: var(--ink); line-height: 1.8; }
    .ce-script-q::before { content: '「'; color: var(--brown-light); }
    .ce-script-q::after { content: '」'; color: var(--brown-light); }
    .ce-script-cta { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(196,164,138,0.4); font-size: 12px; color: var(--ink); line-height: 1.75; }
    .ce-cta-lbl { display: inline-block; font-family: var(--en); font-size: 10px; color: var(--brown-light); letter-spacing: 0.16em; margin-right: 8px; }

    /* 紀錄方式 */
    .ce-rec { background: #fff; border: 1px solid rgba(196,164,138,0.22); border-radius: 4px; padding: 14px 16px; }
    .ce-rec ol { margin: 0; padding-left: 22px; font-size: 12px; line-height: 1.9; color: var(--ink); }
    .ce-rec li { margin-bottom: 4px; }
    .ce-rec li strong { color: var(--brown-light); }

    /* 注意事項 */
    .ce-warn { background: rgba(217,119,87,0.06); border: 1px solid rgba(217,119,87,0.25); border-radius: 4px; padding: 14px 16px; margin: 0 22px 22px; }
    .ce-warn-t { font-size: 11px; letter-spacing: 0.2em; color: #b56a4a; margin-bottom: 8px; font-family: var(--en); }
    .ce-warn ul { margin: 0; padding-left: 20px; font-size: 12px; line-height: 1.85; color: var(--ink); }
    .ce-warn li { margin-bottom: 3px; }

    /* ====== TREATMENT PRIORITY (PYRAMID) ====== */
    .pr-intro { padding: 22px 22px 8px; font-size: 13px; line-height: 1.95; color: var(--ink); letter-spacing: 0.04em; }
    .pr-intro p { margin: 0 0 10px; }
    .pr-intro strong { color: var(--ink); font-weight: 500; }
    .pr-intro em { font-style: normal; color: var(--brown-light); font-size: 12px; }

    /* 金字塔 */
    .pr-pyramid { padding: 8px 22px 18px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .pr-layer { width: 100%; padding: 14px 14px 14px 18px; position: relative; color: #fff; display: flex; align-items: center; gap: 10px; border-radius: 3px; }
    .pr-layer .pr-lv { font-family: var(--en); font-size: 18px; font-weight: 500; opacity: 0.6; min-width: 26px; letter-spacing: 0.04em; }
    .pr-layer .pr-name { font-size: 14px; letter-spacing: 0.14em; flex: 1; }
    .pr-layer .pr-tag { font-family: var(--en); font-size: 9px; letter-spacing: 0.22em; opacity: 0.55; }
    .pr-l1 { background: linear-gradient(90deg, #c64a3a, #d97757); width: 100%; }
    .pr-l2 { background: linear-gradient(90deg, #c98a3a, #e09b56); width: 92%; }
    .pr-l3 { background: linear-gradient(90deg, #8aa548, #a8c067); width: 84%; }
    .pr-l4 { background: linear-gradient(90deg, #5388b0, #7aa9c8); width: 76%; }
    .pr-l5 { background: linear-gradient(90deg, #7e62a6, #9c83bd); width: 68%; }
    .pr-l6 { background: linear-gradient(90deg, #6f6f6f, #9a9a9a); width: 60%; }
    .pr-pyr-cap { font-size: 11px; color: var(--brown-light); margin-top: 12px; letter-spacing: 0.12em; text-align: center; line-height: 1.7; }
    .pr-pyr-cap strong { color: var(--ink); }

    /* 層級詳細卡 */
    .pr-layer-card { background: #fff; border: 1px solid rgba(196,164,138,0.22); border-radius: 4px; padding: 14px 16px; margin-bottom: 10px; position: relative; padding-left: 20px; }
    .pr-layer-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 2px 0 0 2px; }
    .pr-layer-card.r1::before { background: #d97757; }
    .pr-layer-card.r2::before { background: #e09b56; }
    .pr-layer-card.r3::before { background: #a8c067; }
    .pr-layer-card.r4::before { background: #7aa9c8; }
    .pr-layer-card.r5::before { background: #9c83bd; }
    .pr-layer-card.r6::before { background: #9a9a9a; }
    .pr-card-hd { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
    .pr-card-lv { font-family: var(--en); font-size: 11px; color: var(--brown-light); letter-spacing: 0.12em; }
    .pr-card-name { font-size: 13px; color: var(--ink); letter-spacing: 0.1em; font-weight: 500; }
    .pr-card-row { font-size: 12px; color: var(--ink); line-height: 1.8; margin-bottom: 3px; }
    .pr-card-row .pr-lbl { color: var(--brown-light); font-size: 10px; letter-spacing: 0.12em; display: inline-block; min-width: 60px; font-family: var(--en); }

    /* 客人對照表 */
    .pr-tbl { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid rgba(196,164,138,0.22); border-radius: 4px; overflow: hidden; }
    .pr-tbl thead { background: var(--ink); color: var(--bg); }
    .pr-tbl th { padding: 10px 8px; font-size: 10px; letter-spacing: 0.16em; font-weight: 400; text-align: left; font-family: var(--tc); }
    .pr-tbl td { padding: 11px 10px; font-size: 12px; vertical-align: top; border-top: 1px solid rgba(196,164,138,0.12); line-height: 1.7; color: var(--ink); }
    .pr-tbl tr:first-child td { border-top: none; }
    .pr-tbl td:first-child { color: var(--brown-light); }
    .pr-tbl td.pr-correct { color: var(--ink); }

    /* 案例 */
    .pr-case { background: rgba(217,119,87,0.05); border-left: 3px solid #d97757; padding: 14px 16px; border-radius: 0 3px 3px 0; }
    .pr-case-t { font-size: 11px; color: #b56a4a; letter-spacing: 0.18em; margin-bottom: 8px; font-family: var(--en); }
    .pr-case-name { font-size: 13px; color: var(--ink); margin-bottom: 6px; letter-spacing: 0.06em; font-weight: 500; }
    .pr-case-row { font-size: 12px; color: var(--ink); line-height: 1.8; margin-bottom: 4px; }
    .pr-case-row .pr-clbl { color: var(--brown-light); font-size: 10px; letter-spacing: 0.12em; display: inline-block; min-width: 80px; }

    /* 客人比喻 */
    .pr-metaphor { background: var(--ink); color: var(--bg); padding: 22px 22px; margin: 8px 22px; border-radius: 4px; text-align: center; }
    .pr-metaphor-t { font-family: var(--en); font-size: 10px; color: var(--brown-pale); letter-spacing: 0.32em; margin-bottom: 12px; }
    .pr-metaphor-q { font-size: 13px; line-height: 2; letter-spacing: 0.04em; }
    .pr-metaphor-q::before { content: '「'; color: var(--brown-pale); }
    .pr-metaphor-q::after { content: '」'; color: var(--brown-pale); }

    /* 3-step check (priority 真實案例延伸) */
    .pr-3q {
      margin: 12px 22px 0;
      background: var(--card); border: 1px solid var(--line);
      border-left: 3px solid var(--accent);
      border-radius: 4px; padding: 14px 18px;
    }
    .pr-3q-head {
      font-family: var(--en); font-size: 10px;
      letter-spacing: 0.25em; color: var(--brown-light);
      text-transform: uppercase; margin-bottom: 10px;
    }
    .pr-3q-list {
      margin: 0; padding-left: 18px;
      font-size: 12px; line-height: 1.9;
      color: var(--ink-mid); letter-spacing: 0.04em;
    }
    .pr-3q-list li { margin-bottom: 6px; }
    .pr-3q-list li strong { color: var(--ink); font-weight: 600; }
    .pr-3q-list li .note { color: var(--ink-soft); }
    .pr-3q-conclusion {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px dashed var(--line-soft);
      font-size: 12px; line-height: 1.75;
      color: var(--ink-mid); letter-spacing: 0.04em;
    }
    .pr-3q-conclusion strong { color: var(--warn); font-weight: 600; }

    /* Service History Template (服務歷程填寫範本) */
    .sht-intro {
      margin: 16px 16px 14px;
      padding: 12px 14px;
      background: rgba(184,128,74,0.06);
      border: 1px solid rgba(184,128,74,0.22);
      border-radius: 6px;
      font-size: 12px; color: var(--ink-mid);
      line-height: 1.75; letter-spacing: 0.04em;
    }
    .sht-intro strong { color: var(--accent); font-weight: 600; }
    .sht-card {
      margin: 0 16px 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }
    .sht-card-head {
      padding: 14px 18px;
      background: var(--ink); color: var(--bg);
      display: flex; align-items: center; gap: 10px;
      position: relative; overflow: hidden;
    }
    .sht-card-head::before {
      content: ''; position: absolute; top: -15px; right: -15px;
      width: 60px; height: 60px; border-radius: 50%;
      background: rgba(196,164,138,0.06);
    }
    .sht-card-en {
      font-family: var(--en); font-size: 10px; font-style: italic;
      letter-spacing: 0.22em; color: var(--brown-pale);
      text-transform: uppercase;
    }
    .sht-card-title {
      font-size: 15px; font-weight: 500; letter-spacing: 0.12em;
      margin-left: auto;
    }
    .sht-body {
      margin: 0; padding: 16px 18px;
      font-family: var(--tc); font-size: 13px;
      line-height: 1.95; letter-spacing: 0.04em;
      color: var(--ink); white-space: pre-wrap;
      background: var(--bg);
    }
    .sht-fillin {
      color: var(--accent); font-weight: 600;
      background: rgba(184,128,74,0.12);
      padding: 1px 4px; border-radius: 2px;
    }
    .sht-actions {
      padding: 14px 18px; display: flex; gap: 8px;
      border-top: 1px solid var(--line-soft);
    }
    .sht-copy {
      flex: 1; padding: 10px 16px;
      background: var(--accent); color: var(--bg);
      border: none; border-radius: 4px;
      font-family: var(--tc); font-size: 13px;
      letter-spacing: 0.15em; cursor: pointer;
      transition: all 160ms;
    }
    .sht-copy:hover, .sht-copy:active { background: var(--ink); }
    .sht-copy.copied { background: var(--done); }

    /* Consultation Technique (面診技巧) */
    .ct-content { padding: 0 12px 20px; }
    .ct-chapter {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 6px; margin: 0 4px 10px; overflow: hidden;
    }
    .ct-chapter[open] { box-shadow: 0 4px 12px rgba(58,32,18,0.04); }
    .ct-summary {
      padding: 14px 18px; cursor: pointer; list-style: none;
      font-size: 14px; font-weight: 500; letter-spacing: 0.1em;
      color: var(--ink); background: var(--card);
      display: flex; align-items: center; user-select: none;
      transition: background 160ms;
    }
    .ct-summary::-webkit-details-marker { display: none; }
    .ct-summary:hover { background: var(--bg-soft); }
    .ct-chapter[open] .ct-summary {
      background: var(--ink); color: var(--bg);
      border-bottom: 1px solid var(--line);
    }
    .ct-arrow {
      margin-left: auto; font-size: 12px;
      color: var(--brown-light); transition: transform 200ms;
    }
    .ct-chapter[open] .ct-arrow {
      transform: rotate(180deg); color: var(--brown-pale);
    }
    .ct-body {
      padding: 4px 18px 18px; font-size: 13px;
      line-height: 1.85; color: var(--ink-mid);
      letter-spacing: 0.03em;
    }
    .ct-body h3 {
      font-size: 14px; font-weight: 600;
      color: var(--ink); letter-spacing: 0.1em;
      margin: 20px 0 10px; padding-top: 12px;
      border-top: 1px solid var(--line-soft);
    }
    .ct-body h3:first-child { border-top: none; padding-top: 0; margin-top: 8px; }
    .ct-body h4 {
      font-size: 13px; font-weight: 600;
      color: var(--ink-mid); letter-spacing: 0.08em;
      margin: 14px 0 6px;
    }
    .ct-body p { margin: 8px 0; }
    .ct-body ul, .ct-body ol {
      padding-left: 20px; margin: 8px 0;
    }
    .ct-body li { margin-bottom: 4px; }
    .ct-body strong { color: var(--ink); font-weight: 600; }
    .ct-body em { color: var(--accent); font-style: normal; font-weight: 500; }
    .ct-body blockquote {
      margin: 12px 0; padding: 10px 14px;
      background: var(--bg); border-left: 3px solid var(--accent);
      border-radius: 0 4px 4px 0; color: var(--ink-mid);
      font-size: 12px; line-height: 1.75;
    }
    .ct-body blockquote p { margin: 4px 0; }
    .ct-body table {
      width: 100%; border-collapse: collapse;
      font-size: 12px; margin: 12px 0;
    }
    .ct-body th, .ct-body td {
      padding: 8px 10px; border: 1px solid var(--line-soft);
      text-align: left; vertical-align: top;
    }
    .ct-body th {
      background: var(--bg-soft); color: var(--ink);
      font-weight: 600; letter-spacing: 0.05em;
    }
    .ct-body code {
      background: var(--bg); padding: 1px 5px;
      border-radius: 3px; font-size: 11px;
      color: var(--accent);
    }

    /* House Rules (內部守則) */
    .hr-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
    .hr-card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 6px; overflow: hidden;
    }
    .hr-card-head {
      padding: 14px 18px; background: var(--ink); color: var(--bg);
      display: flex; align-items: center; gap: 14px;
      position: relative; overflow: hidden;
    }
    .hr-card-head::before {
      content: ''; position: absolute; top: -15px; right: -15px;
      width: 60px; height: 60px; border-radius: 50%;
      background: rgba(196,164,138,0.06);
    }
    .hr-num {
      font-family: var(--en); font-size: 20px; font-weight: 600;
      color: var(--brown-pale); letter-spacing: 0.05em;
      min-width: 32px; position: relative; z-index: 1;
    }
    .hr-title {
      font-size: 15px; font-weight: 500; letter-spacing: 0.15em;
      position: relative; z-index: 1;
    }
    .hr-body {
      padding: 14px 18px; font-size: 13px; line-height: 1.9;
      color: var(--ink-mid); letter-spacing: 0.04em;
    }
    .hr-case-box {
      margin: 20px 16px 12px;
      background: rgba(217,119,87,0.06);
      border: 1px solid rgba(217,119,87,0.25);
      border-left: 3px solid var(--warn);
      border-radius: 6px; padding: 16px 18px;
    }
    .hr-case-title {
      font-size: 13px; font-weight: 600; color: var(--warn);
      letter-spacing: 0.1em; margin-bottom: 12px;
    }
    .hr-case-item {
      padding: 10px 12px; background: var(--card);
      border-radius: 4px; margin-bottom: 10px;
      font-size: 12px; line-height: 1.8;
      color: var(--ink-mid); letter-spacing: 0.04em;
    }
    .hr-case-item:last-child { margin-bottom: 0; }
    .hr-case-item strong { color: var(--warn); font-weight: 600; }
    .hr-case-do {
      margin-top: 8px; padding-top: 8px;
      border-top: 1px dashed var(--line-soft);
      color: var(--done); font-size: 11px;
    }
    .hr-case-do strong { color: var(--done); font-weight: 600; }

    /* Sub-section header (員工訓練分大類用) */
    .sub-hd {
      display: flex; align-items: center; gap: 8px;
      margin: 22px 4px 10px;
      padding: 0 2px;
    }
    .sub-hd-en {
      font-family: var(--en); font-size: 9px; font-style: italic;
      letter-spacing: 0.22em; color: var(--brown-pale);
      text-transform: uppercase;
    }
    .sub-hd-title {
      font-size: 11px; font-weight: 600; letter-spacing: 0.18em;
      color: var(--ink-mid);
    }
    .sub-hd-line { flex: 1; height: 1px; background: var(--line-soft); }

    /* Equipment selector (儀器選單) */
    .eq-selector {
      display: flex; gap: 6px;
      padding: 16px 16px 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .eq-selector::-webkit-scrollbar { display: none; }
    .eq-chip {
      flex-shrink: 0; padding: 8px 16px;
      background: var(--card); border: 1px solid var(--line);
      border-radius: 100px; font-family: var(--tc);
      font-size: 12px; color: var(--ink-soft);
      letter-spacing: 0.1em; cursor: pointer;
      transition: all 160ms; line-height: 1.4;
    }
    .eq-chip.active {
      background: var(--ink); color: var(--bg);
      border-color: var(--ink);
    }
    .eq-chip:hover:not(.active) {
      border-color: var(--brown-light); color: var(--ink-mid);
    }
    .eq-machine { display: none; }
    .eq-machine.active { display: block; }

    /* Equipment contraindications list */
    .eq-contra-wrap {
      margin: 0 16px 20px;
      background: rgba(217,119,87,0.06);
      border: 1px solid rgba(217,119,87,0.25);
      border-radius: 6px;
      padding: 14px 18px;
    }
    .eq-contra-list {
      list-style: none;
      padding: 0; margin: 0;
      columns: 2; column-gap: 18px;
    }
    .eq-contra-list li {
      font-size: 12px; line-height: 1.85;
      color: var(--ink-mid); letter-spacing: 0.04em;
      padding-left: 16px; position: relative;
      break-inside: avoid;
      margin-bottom: 4px;
    }
    .eq-contra-list li::before {
      content: '\2715'; position: absolute; left: 0;
      color: var(--warn); font-weight: 600;
      font-size: 10px; top: 2px;
    }
    @media (max-width: 380px) {
      .eq-contra-list { columns: 1; }
    }

    /* Equipment post-care */
    .eq-postcare {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 6px;
      margin: 0 16px 20px;
      padding: 16px 18px;
    }
    .eq-pc-row { margin-bottom: 16px; }
    .eq-pc-row:last-child { margin-bottom: 0; }
    .eq-pc-label {
      font-family: var(--en); font-size: 10px; font-style: italic;
      letter-spacing: 0.22em; color: var(--brown-light);
      text-transform: uppercase; margin-bottom: 8px;
    }
    .eq-pc-label-warn { color: var(--warn); }
    .eq-pc-val {
      font-size: 12px; line-height: 1.8;
      color: var(--ink-mid); letter-spacing: 0.04em;
    }
    .eq-pc-script {
      font-size: 13px; line-height: 1.85;
      color: var(--ink); letter-spacing: 0.05em;
      background: var(--bg); padding: 12px 14px;
      border-left: 3px solid var(--accent);
      border-radius: 0 4px 4px 0;
      font-style: italic;
    }
    .eq-pc-list {
      font-size: 12px; line-height: 1.9;
      color: var(--ink-mid); letter-spacing: 0.04em;
      padding-left: 18px; margin: 0;
    }
    .eq-pc-list li { margin-bottom: 3px; }
    .eq-pc-warn li::marker { color: var(--warn); content: '\26A0  '; }
    .eq-pc-warn li {
      padding-left: 4px; color: var(--ink);
    }

    /* ============================================================
       UPGRADE SCRIPT 首次體驗升級話術
       ============================================================ */
    .us-intro {
      margin: 0 16px 18px;
      padding: 14px 16px;
      background: var(--card); border: 1px solid var(--line);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      font-size: 12px; color: var(--ink-mid);
      line-height: 1.85; letter-spacing: 0.04em;
    }
    .us-intro strong { color: var(--accent); font-weight: 600; }

    /* 首次體驗定義對照表 */
    .us-def {
      margin: 0 16px 20px;
      background: var(--card); border: 1px solid var(--line);
      border-radius: 6px; overflow: hidden;
    }
    .us-def-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line-soft);
      font-size: 12px; line-height: 1.7;
    }
    .us-def-row:last-child { border-bottom: none; }
    .us-def-label {
      font-family: var(--en); font-size: 10px; font-style: italic;
      color: var(--brown-light); letter-spacing: 0.12em;
      text-transform: uppercase; padding-top: 2px;
    }
    .us-def-val { color: var(--ink); letter-spacing: 0.04em; }
    .us-def-val strong { color: var(--accent); font-weight: 600; }

    /* 升級話術萬用框架（黑底白字 · 員工可秀手機） */
    .us-script-frame {
      margin: 0 16px 18px;
      background: var(--ink); color: var(--bg);
      border-radius: 6px; padding: 18px 20px;
      font-size: 13px; line-height: 1.95;
      letter-spacing: 0.05em;
      position: relative; overflow: hidden;
    }
    .us-script-frame::before {
      content: ''; position: absolute; top: -25px; right: -25px;
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(196,164,138,0.06);
    }
    .us-script-frame-tag {
      font-family: var(--en); font-size: 10px; font-style: italic;
      letter-spacing: 0.3em; color: var(--brown-pale);
      text-transform: uppercase; margin-bottom: 12px;
      position: relative; z-index: 1;
    }
    .us-script-frame em {
      font-style: normal; font-weight: 600;
      color: #e8c99a; padding: 0 2px;
    }

    /* 3 關鍵語感 */
    .us-tip3 {
      margin: 0 16px 20px;
      background: rgba(184,128,74,0.05);
      border: 1px solid rgba(184,128,74,0.2);
      border-radius: 6px; padding: 14px 16px;
    }
    .us-tip3-head {
      font-family: var(--en); font-size: 10px; font-style: italic;
      letter-spacing: 0.2em; color: var(--accent);
      text-transform: uppercase; margin-bottom: 10px;
    }
    .us-tip3-list { margin: 0; padding-left: 18px; font-size: 12px; line-height: 1.85; color: var(--ink-mid); }
    .us-tip3-list li { margin-bottom: 4px; letter-spacing: 0.04em; }
    .us-tip3-list strong { color: var(--ink); font-weight: 600; }

    /* 5 主訴 × 3 層級矩陣（每個主訴一張卡片含內嵌表格） */
    .us-matrix { padding: 0 16px; }
    .us-mat-card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 6px; margin-bottom: 12px; overflow: hidden;
    }
    .us-mat-head {
      padding: 12px 16px; border-bottom: 1px solid var(--line-soft);
      display: flex; align-items: center; gap: 10px;
    }
    .us-mat-icon {
      font-size: 18px; flex-shrink: 0; width: 28px; text-align: center;
    }
    .us-mat-name {
      font-size: 14px; font-weight: 600; color: var(--ink);
      letter-spacing: 0.12em;
    }
    .us-mat-en {
      font-family: var(--en); font-size: 10px;
      color: var(--brown-pale); letter-spacing: 0.15em;
      margin-left: auto; text-transform: uppercase;
    }
    .us-mat-table { width: 100%; border-collapse: collapse; font-family: var(--tc); font-size: 11px; }
    .us-mat-table th {
      background: var(--bg-soft); padding: 8px 10px;
      font-size: 10px; letter-spacing: 0.12em;
      color: var(--ink-mid); font-weight: 600; text-align: left;
    }
    .us-mat-table td {
      padding: 10px; border-bottom: 1px solid var(--line-soft);
      vertical-align: top; color: var(--ink-mid);
      letter-spacing: 0.03em; line-height: 1.6;
    }
    .us-mat-table tr:last-child td { border-bottom: none; }
    .us-mat-lv {
      font-weight: 600; color: var(--ink);
      letter-spacing: 0.08em; white-space: nowrap;
    }
    .us-mat-table strong { color: var(--accent); font-weight: 600; }

    /* 敏感獨立路徑（紅底警示） */
    .us-sensitive {
      margin: 16px;
      background: rgba(217,119,87,0.05);
      border: 1px solid rgba(217,119,87,0.3);
      border-left: 4px solid var(--warn);
      border-radius: 6px;
      padding: 16px 18px;
    }
    .us-sensitive-warn {
      font-size: 13px; font-weight: 600; color: var(--warn);
      letter-spacing: 0.05em; margin-bottom: 12px;
      padding: 10px 12px; background: var(--card);
      border-radius: 4px; line-height: 1.7;
    }
    .us-sens-noway {
      margin-top: 14px; padding: 12px 14px;
      background: var(--card); border-radius: 4px;
    }
    .us-sens-noway-head {
      font-size: 12px; font-weight: 600; color: var(--warn);
      letter-spacing: 0.1em; margin-bottom: 8px;
    }
    .us-sens-noway-list { margin: 0; padding-left: 18px; font-size: 11px; line-height: 1.85; color: var(--ink-mid); }

    /* 一般 us 表格（加值療程 / 加購 / 包堂 / 儲值） */
    .us-list-table {
      margin: 0 16px 18px;
      width: calc(100% - 32px);
      border-collapse: collapse;
      background: var(--card); border: 1px solid var(--line);
      border-radius: 6px; overflow: hidden;
      font-family: var(--tc); font-size: 12px;
    }
    .us-list-table th {
      background: var(--ink); color: var(--bg);
      padding: 9px 12px; text-align: left;
      font-size: 10px; letter-spacing: 0.15em;
      font-weight: 500;
    }
    .us-list-table td {
      padding: 10px 12px; border-bottom: 1px solid var(--line-soft);
      color: var(--ink-mid); line-height: 1.65;
      letter-spacing: 0.03em; vertical-align: top;
    }
    .us-list-table tr:last-child td { border-bottom: none; }
    .us-list-table td:first-child { color: var(--ink); font-weight: 500; white-space: nowrap; }
    .us-list-table td.us-price { color: var(--accent); font-weight: 600; font-family: var(--en); }
    .us-list-table strong { color: var(--accent); font-weight: 600; }

    /* 特殊處理區塊 */
    .us-special {
      margin: 0 16px 14px;
      background: var(--card); border: 1px solid var(--line);
      border-left: 3px solid var(--brown-light);
      border-radius: 6px; padding: 14px 16px;
    }
    .us-special-head {
      font-size: 13px; font-weight: 600; color: var(--ink);
      letter-spacing: 0.08em; margin-bottom: 10px;
    }
    .us-special-body {
      font-size: 12px; line-height: 1.85;
      color: var(--ink-mid); letter-spacing: 0.04em;
    }
    .us-special-script {
      margin-top: 10px; padding: 10px 12px;
      background: var(--bg); border-left: 3px solid var(--accent);
      border-radius: 0 4px 4px 0;
      font-style: italic; font-size: 12px;
      color: var(--ink); line-height: 1.85;
    }

    /* ============================================================
       FORMULA HANDBOOK + 9 CAPSULES — 從 mockup 整合進主檔
       ============================================================ */

    /* Search input (formulas) */
    .search-wrap { padding: 16px 16px 8px; }
    .search-input {
      width: 100%; padding: 12px 14px;
      background: var(--card); border: 1px solid var(--line);
      border-radius: 6px; font-family: var(--tc);
      font-size: 13px; color: var(--ink);
      letter-spacing: 0.05em;
    }
    .search-input::placeholder { color: var(--brown-pale); letter-spacing: 0.1em; }
    .search-input:focus { outline: none; border-color: var(--accent); }

    /* Filter chips (formulas) */
    .filter-row { padding: 0 16px 8px; }
    .filter-label {
      font-family: var(--en); font-size: 10px;
      letter-spacing: 0.25em; color: var(--brown-pale);
      text-transform: uppercase; margin-bottom: 8px; padding: 0 2px;
    }
    .chips {
      display: flex; gap: 6px; overflow-x: auto;
      padding-bottom: 4px; margin-bottom: 12px;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 7px 14px;
      background: var(--card); border: 1px solid var(--line);
      border-radius: 100px; font-family: var(--tc);
      font-size: 12px; color: var(--ink-soft);
      letter-spacing: 0.08em; cursor: pointer;
      transition: all 160ms;
    }
    .chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .chip:hover:not(.active) { border-color: var(--brown-light); color: var(--ink-mid); }

    /* Combo header (formulas) */
    .combo {
      margin: 0 16px 14px;
      background: var(--ink); color: var(--bg);
      border-radius: 6px; padding: 18px 20px;
      position: relative; overflow: hidden;
    }
    .combo::before {
      content: ''; position: absolute; top: -20px; right: -20px;
      width: 90px; height: 90px; border-radius: 50%;
      background: rgba(196,164,138,0.06);
    }
    .combo-en {
      font-family: var(--en); font-size: 10px;
      letter-spacing: 0.3em; color: var(--brown-pale);
      text-transform: uppercase; margin-bottom: 6px;
    }
    .combo-title { font-size: 18px; font-weight: 500; letter-spacing: 0.15em; margin-bottom: 4px; }
    .combo-sub { font-size: 11px; color: var(--brown-pale); letter-spacing: 0.1em; }

    /* Formula cards */
    .fmla-list { display: flex; flex-direction: column; gap: 10px; padding: 0 16px; }
    .fmla {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 6px; padding: 16px 18px;
      position: relative; overflow: hidden;
    }
    .fmla::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--brown-light); }
    .fmla-step { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .fmla-step-num { font-family: var(--en); font-size: 14px; font-weight: 600; color: var(--brown-light); letter-spacing: 0.1em; }
    .fmla-step-name { font-size: 14px; font-weight: 600; color: var(--ink); letter-spacing: 0.12em; }
    .fmla-recipe {
      background: var(--bg); padding: 12px 14px;
      border-radius: 4px; margin-bottom: 12px;
      font-size: 14px; font-weight: 500;
      color: var(--ink); letter-spacing: 0.06em;
      line-height: 1.65;
      border: 1px dashed var(--line);
    }
    .fmla-recipe strong { color: var(--accent); font-weight: 600; }
    .fmla-meta { display: flex; flex-direction: column; gap: 8px; }
    .fmla-note {
      display: flex; gap: 8px; align-items: flex-start;
      font-size: 12px; line-height: 1.65;
      color: var(--ink-soft); letter-spacing: 0.04em;
    }
    .fmla-note-icon {
      flex-shrink: 0; font-family: var(--en); font-size: 11px;
      font-style: italic; color: var(--brown-light);
      letter-spacing: 0.05em; min-width: 36px;
    }
    .fmla-note-icon.warn { color: var(--warn); }
    .fmla-note-body { flex: 1; }

    /* Formula placeholder (rename to avoid clash with index .pholder) */
    .fmla-pholder {
      background: transparent; border: 1px dashed var(--line);
      border-radius: 6px; padding: 16px 18px;
      opacity: 0.7; margin: 0 16px 10px;
      text-align: center;
    }
    .fmla-pholder-tag {
      font-family: var(--en); font-size: 9px; font-style: italic;
      letter-spacing: 0.25em; color: var(--brown-pale);
      text-transform: uppercase; margin-bottom: 4px;
    }
    .fmla-pholder-text {
      font-size: 12px; color: var(--ink-soft); letter-spacing: 0.05em;
    }

    /* Quick reference table (capsules) */
    .qref-wrap { margin: 0 16px 20px; }
    .qref-intro { font-size: 12px; color: var(--ink-soft); letter-spacing: 0.05em; margin-bottom: 12px; line-height: 1.7; }
    .qref-intro em { font-style: normal; color: var(--accent); font-weight: 500; }
    .qref-scroll { overflow-x: auto; background: var(--card); border: 1px solid var(--line); border-radius: 6px; -webkit-overflow-scrolling: touch; }
    .qref-table { width: 100%; border-collapse: collapse; min-width: 540px; font-family: var(--tc); font-size: 12px; }
    .qref-table th { background: var(--ink); color: var(--bg); font-weight: 500; padding: 10px 12px; text-align: left; letter-spacing: 0.15em; font-size: 11px; white-space: nowrap; }
    .qref-table td { padding: 10px 12px; border-bottom: 1px solid var(--line-soft); color: var(--ink-mid); letter-spacing: 0.03em; font-weight: 300; line-height: 1.6; }
    .qref-table tr:last-child td { border-bottom: none; }
    .qref-table td:first-child { font-weight: 500; color: var(--ink); letter-spacing: 0.05em; white-space: nowrap; }
    .qref-table td:first-child .badge {
      display: inline-block; width: 22px; height: 22px; border-radius: 50%;
      color: var(--bg); font-family: var(--en); font-weight: 600;
      text-align: center; line-height: 22px; font-size: 11px; margin-right: 6px;
      vertical-align: middle;
    }
    .qref-table tr.tx td:first-child .badge { background: var(--tx); }
    .qref-table tr.wr td:first-child .badge { background: var(--wr); }
    .qref-table tr.pi td:first-child .badge { background: var(--pi); }
    .qref-table tr.tr td:first-child .badge { background: var(--tr); }
    .qref-table tr.wh td:first-child .badge { background: var(--wh); }
    .qref-table tr.rd td:first-child .badge { background: var(--rd); }
    .qref-table tr.se td:first-child .badge { background: var(--se); }
    .qref-table tr.hy td:first-child .badge { background: var(--hy); }
    .qref-table tr.po td:first-child .badge { background: var(--po); }
    .qref-hint { font-size: 11px; color: var(--brown-pale); letter-spacing: 0.05em; text-align: center; margin-top: 8px; font-style: italic; }

    /* Capsule accordion cards */
    .caps-list { padding: 0 16px; }
    .caps-card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 6px; margin-bottom: 10px; overflow: hidden;
      transition: box-shadow 200ms;
    }
    .caps-card[open] { box-shadow: 0 6px 20px rgba(58,32,18,0.06); }
    .caps-card summary {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; cursor: pointer; list-style: none;
      user-select: none;
    }
    .caps-card summary::-webkit-details-marker { display: none; }
    .caps-badge {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--en); font-weight: 600; font-size: 18px;
      color: var(--bg); flex-shrink: 0; letter-spacing: 0;
    }
    .caps-tx { background: var(--tx); }
    .caps-wr { background: var(--wr); }
    .caps-pi { background: var(--pi); }
    .caps-tr { background: var(--tr); }
    .caps-wh { background: var(--wh); }
    .caps-rd { background: var(--rd); }
    .caps-se { background: var(--se); }
    .caps-hy { background: var(--hy); }
    .caps-po { background: var(--po); }
    .caps-name-wrap { flex: 1; min-width: 0; }
    .caps-name { font-size: 16px; font-weight: 600; letter-spacing: 0.12em; color: var(--ink); }
    .caps-en { font-family: var(--en); font-size: 10px; letter-spacing: 0.2em; color: var(--brown-pale); text-transform: uppercase; margin-top: 2px; }
    .caps-arrow { color: var(--brown-light); font-size: 12px; transition: transform 200ms; }
    .caps-card[open] .caps-arrow { transform: rotate(180deg); }
    .caps-body { padding: 0 16px 18px; border-top: 1px solid var(--line-soft); }
    .caps-tagline {
