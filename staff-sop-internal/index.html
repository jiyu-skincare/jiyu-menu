      font-size: 13px; color: var(--ink-mid); line-height: 1.75;
      letter-spacing: 0.05em; padding: 14px 14px; margin: 14px 0;
      background: var(--bg); border-radius: 4px; border-left: 3px solid var(--accent);
    }
    .caps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .caps-cell { background: var(--bg-soft); padding: 10px 12px; border-radius: 4px; }
    .caps-cell-label {
      font-family: var(--en); font-size: 9px; font-style: italic;
      color: var(--brown-light); letter-spacing: 0.15em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .caps-cell-value { font-size: 12px; color: var(--ink); letter-spacing: 0.03em; line-height: 1.6; font-weight: 500; }
    .caps-meta-row {
      display: flex; gap: 8px; align-items: flex-start;
      padding: 10px 0; border-bottom: 1px dashed var(--line-soft);
      font-size: 12px; line-height: 1.7; letter-spacing: 0.03em;
    }
    .caps-meta-row:last-child { border-bottom: none; }
    .caps-meta-label {
      flex-shrink: 0; min-width: 70px;
      font-weight: 500; color: var(--ink-mid); letter-spacing: 0.1em;
    }
    .caps-meta-value { flex: 1; color: var(--ink-soft); }
    .caps-clinical {
      margin-top: 14px; padding: 14px;
      background: var(--bg-soft); border: 1px dashed var(--line); border-radius: 4px;
    }
    .caps-clinical-head {
      font-family: var(--en); font-size: 10px; font-style: italic;
      letter-spacing: 0.2em; color: var(--brown-light);
      text-transform: uppercase; margin-bottom: 10px; text-align: center;
    }
    .caps-clinical-item {
      background: var(--card); padding: 10px 12px; border-radius: 3px;
      margin-bottom: 8px; font-size: 11px; line-height: 1.7;
      letter-spacing: 0.04em; color: var(--ink-soft);
    }
    .caps-clinical-item:last-child { margin-bottom: 0; }
    .caps-clinical-item strong { color: var(--accent); font-weight: 600; }
    .caps-clinical-formula {
      font-family: var(--en); font-size: 11px; color: var(--ink-mid);
      letter-spacing: 0.05em; margin-bottom: 4px;
    }

    /* ============================================================
       CHECK-IN SOP — 進門前置作業
       ============================================================ */
    .ci-intro {
      margin: 16px 16px 20px;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--line);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      font-size: 12px;
      color: var(--ink-mid);
      line-height: 1.8;
      letter-spacing: 0.05em;
    }
    .ci-intro em {
      font-style: normal; color: var(--accent); font-weight: 500;
    }
    .ci-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
    .ci-item {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
    }
    .ci-item::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--brown-light);
    }
    .ci-head {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; padding-bottom: 12px;
      border-bottom: 1px dashed var(--line-soft);
    }
    .ci-num {
      font-family: var(--en); font-size: 14px; font-weight: 600;
      color: var(--brown-light); letter-spacing: 0.1em; flex-shrink: 0;

  <script>
  (function() {
    var HASH = '7f861bcee185de001377d79e08af62e94b1e7718e2470e08520c917f8d953602'; // sha256("1005")
    var KEY = 'jiyu_sop_auth';
    var TTL = 30 * 24 * 60 * 60 * 1000; // 30 天

    // localhost / file:// 自動 bypass（本地開發不用密碼）
    var host = location.hostname;
    if (host === 'localhost' || host === '127.0.0.1' || host === '' || location.protocol === 'file:') {
      return;
    }

    async function sha256(s) {
      var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function isAuthed() {
      try {
        var d = JSON.parse(localStorage.getItem(KEY) || 'null');
        return d && d.h === HASH && (Date.now() - d.t) < TTL;
      } catch(e) { return false; }
    }

    function showGate() {
      var g = document.getElementById('sopGate');
      if (g) {
        g.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        setTimeout(function(){ var i = document.getElementById('sopPwd'); if(i) i.focus(); }, 100);
      }
    }
    function hideGate() {
      var g = document.getElementById('sopGate');
      if (g) g.style.display = 'none';
      document.body.style.overflow = '';
    }

    async function check() {
      var val = (document.getElementById('sopPwd').value || '').trim();
      var h = await sha256(val);
      var msg = document.getElementById('sopMsg');
      if (h === HASH) {
        localStorage.setItem(KEY, JSON.stringify({h: HASH, t: Date.now()}));
        msg.textContent = '';
        hideGate();
      } else {
        msg.textContent = '密碼錯誤';
        document.getElementById('sopPwd').value = '';
      }
    }

    if (isAuthed()) return; // 已登入過、30 天內不用再輸

    // 等 DOM 好再 attach
    function init() {
      showGate();
      document.getElementById('sopBtn').addEventListener('click', check);
      document.getElementById('sopPwd').addEventListener('keydown', function(e){
        if (e.key === 'Enter') check();
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>

  function renderCategory(catId) {

    if (!cat) return renderHome();
    $fm.textContent = `${cat.name} SOP · 僅供員工使用`;
    const { total, done } = countStatus(catId);
    const pct = total > 0 ? (done/total)*100 : 0;

    const sectionsHTML = cat.sections.map((sec, idx) => {
      const last = idx === cat.sections.length - 1 ? 'cat-sec-last' : '';
      let listHTML = '';
      if (sec.groups) {
        listHTML = sec.groups.map(g => `
          <div class="tgrp">
            <div class="tgrp-hd"><span class="tgrp-label">${esc(g.label)}</span><span class="tgrp-line"></span></div>

          </div>`).join('');
      } else {
        listHTML = `<ul class="clist">${sec.courses.map(id => renderCard(id)).join('')}</ul>`;
      }
      const count = sec.groups ? sec.groups.reduce((n,g) => n + g.courses.length, 0) : sec.courses.length;
      return `
        <section class="cat-sec ${last}">
          <div class="sec-hd">
            <span class="sec-num">${sec.num}</span>
            <span class="sec-title">${sec.title.split('').join(' ')}</span>

            <span class="sec-count">${count}</span>
          </div>
          ${listHTML}

    }).join('');

    const introHTML = cat.intro ? `<div class="cat-intro">${esc(cat.intro.lead)}<br><em>${esc(cat.intro.em)}</em></div>` : '';
    const extraHTML = (cat.intro && cat.intro.extraHTML) ? cat.intro.extraHTML : '';

    $view.innerHTML = `
      <nav class="back-bar"><a href="#/"><span class="back-arr">←</span><span class="back-en">HOME</span><span>回首頁</span></a></nav>
      <header class="hero">

  function renderCard(id) {
    const c = COURSES[id];
    if (!c) return '';
    const done = c.status === 'complete';
    const cls = ['cc'];
    if (done) cls.push('done');
    if (c.level === 1) cls.push('lv1');
    if (c.level === 2) cls.push('lv2');
    if (c.level === 3) cls.push('lv3');
    if (c.level === 4) cls.push('lv4');
    if (c.isPost) cls.push('is-post');
    if (c.tier === 'premium') cls.push('premium');

    const meta = c.metaEn ? `<div class="cmeta-en">${esc(c.metaEn)}</div>`
      : (c.metaTc ? `<div class="cmeta-tc">${esc(c.metaTc)}</div>` : '');
    const desc = c.desc ? `<div class="cdesc">${c.desc.replace(/\n/g,'<br>')}</div>` : '';
    const chip = done ? `<span class="schip sd">查看</span>` : `<span class="schip sp">建置中</span>`;
    const body = `<div class="cbody">${meta}<div class="cname">${esc(c.name)}</div>${desc}</div>${chip}`;

    if (done) return `<li class="${cls.join(' ')}" ${c.tier?`data-tier="${c.tier}"`:''}><a href="#/course/${id}">${body}</a></li>`;
    return `<li class="${cls.join(' ')}" ${c.tier?`data-tier="${c.tier}"`:''}><div class="inner">${body}</div></li>`;
  }

  function renderStep(step, idx) {
    const hasTimer = typeof step.timer === 'number';
    const timerHTML = hasTimer
      ? `<div class="tw" data-sec="${step.timer}">
           <div class="tdisp">${fmt(step.timer)}</div>
           <div class="tctrl">
             <button class="tb tm-s">開始</button>
             <button class="tb tm-p" disabled>暫停</button>
             <button class="tb tm-r" disabled>重置</button>
           </div>
         </div>`
      : (step.noTimerNote ? `<div class="no-timer">${esc(step.noTimerNote)}</div>` : '');

    const chips = [];
    if (hasTimer) chips.push(`<span class="chip ct">⏱ ${Math.floor(step.timer/60)} 分</span>`);
    if (step.meta === '準備') chips.push(`<span class="chip cprep">${esc(step.meta)}</span>`);
    else if (step.meta && step.meta.includes('注意')) chips.push(`<span class="chip cwarn">${esc(step.meta)}</span>`);
    else if (step.meta) chips.push(`<span class="chip">${esc(step.meta)}</span>`);
    if (step.branches) chips.push(`<span class="chip cbr">A / B 路徑</span>`);

    let prodBody;
    if (step.branches) {
      const tabs = step.branches.map((b, bi) =>
        `<button class="btab ${bi===0?'on':''}" data-br="${bi}">${esc(b.label)}<span class="btab-sub">${esc(b.sub||'')}</span></button>`
      ).join('');
      const bodies = step.branches.map((b, bi) =>
        `<div class="bbody ${bi===0?'on':''}" data-br="${bi}">
          <div class="sblk">
            <h3 class="stitle">使用產品 · 儀器</h3>
            ${renderProds(b.products)}
            ${renderMethod(b.method)}
          </div>
        </div>`
      ).join('');
      prodBody = `<div class="btabs" role="tablist">${tabs}</div>${bodies}`;
    } else {
      const hasProds = step.products && step.products.length > 0;
      prodBody = `
        <div class="sblk">
          <h3 class="stitle">使用產品</h3>
          ${hasProds ? renderProds(step.products) : '<p style="font-size:13px;color:var(--ink-soft);font-style:italic;">此步驟不使用額外產品。</p>'}
          ${renderMethod(step.method)}
        </div>`;
    }

    const scriptH = `
      <div class="sblk">
        <h3 class="stitle">客戶話術</h3>
        ${step.script
          ? `<div style="font-size:13px;line-height:1.85;white-space:pre-line;">${esc(step.script)}</div>`
          : `<div class="todo-box"><span class="todo-tag">待補充</span>此步驟的客戶溝通話術尚未填入。</div>`}
      </div>`;

    const handlingH = step.handling ? `
      <div class="sblk">
        <h3 class="stitle">常見狀況 · 注意事項</h3>
        <div class="mblock${step.handling.startsWith('⚠️') ? ' wn' : ''}">${esc(step.handling).replace(/\n/g,'<br>')}</div>
      </div>` : '';

    return `
      <article class="step" data-step="${idx}">
        <div class="step-hd">
          <span class="snum">${idx}</span>
          <div class="schk" role="checkbox" aria-checked="false" tabindex="0"></div>
          <div class="sbody">
            <h2 class="step-title">${esc(step.name)}</h2>
            <div class="smeta">${chips.join('')}</div>
          </div>
          <button class="exp" aria-label="展開">▾</button>
        </div>
        <div class="sdet">
          ${timerHTML}
          ${prodBody}
          ${scriptH}
          ${handlingH}
        </div>
      </article>`;
  }

  function renderProds(prods) {
    if (!prods || !prods.length) return '';
    return `<ul class="plist">${prods.map(p => `
      <li>
        <div class="pname">${esc(p.name)}</div>
        ${p.desc ? `<div class="pdesc">${esc(p.desc)}</div>` : ''}
        ${p.dose ? `<div class="pdose">${esc(p.dose)}</div>` : ''}
      </li>`).join('')}</ul>`;
  }
  function renderMethod(m) {
    if (!m) return '';
    return `<div class="mblock"><strong>使用方法</strong>${esc(m).replace(/\n/g,'<br>')}</div>`;
  }

  function renderHandbook(id) {

    if (!h) return renderHome();
    $fm.textContent = `${h.title} · 僅供員工使用`;

    // Equipment handbook has its own renderer
    if (h.type === 'equipment') return renderEquipmentHandbook(h);

    // Flow overview table
    const flowRows = h.flowOverview.rows.map(r =>
      `<tr><td class="hb-tdr-step">${esc(r[0])}</td><td class="hb-tdr-name">${esc(r[1])}</td><td class="hb-tdr-desc">${esc(r[2])}</td></tr>`

    // Steps
    const stepsHTML = h.steps.map(step => {

        if (s.type === 'warn') return `<div class="hb-warn">${esc(s.text)}</div>`;
        if (s.type === 'script') return `<div class="hb-script">「${esc(s.text)}」</div>`;

  function switchEquipment(id) {
    document.querySelectorAll('.eq-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.eq === id);
    });
    document.querySelectorAll('.eq-machine').forEach(m => {
      m.classList.toggle('active', m.id === 'eq-' + id);
    });
    window.scrollTo(0, 0);
  }

  function bindSOP() {
    const steps = $view.querySelectorAll('.step');
    const total = steps.length;
    const pFill = document.getElementById('pFill');
    const pCount = document.getElementById('pCount');

    function updProg() {
      const n = $view.querySelectorAll('.schk.on').length;
      if (pCount) pCount.textContent = n;
      if (pFill) pFill.style.width = (n/total*100) + '%';
    }

    steps.forEach(step => {
      step.querySelector('.step-hd').addEventListener('click', e => {
        if (e.target.closest('.schk')) return;
        step.classList.toggle('open');
      });
    });

    $view.querySelectorAll('.schk').forEach(c => {
      const toggle = e => {
        e.stopPropagation();
        c.classList.toggle('on');
        c.closest('.step').classList.toggle('done', c.classList.contains('on'));
        c.setAttribute('aria-checked', c.classList.contains('on'));
        updProg();
      };
      c.addEventListener('click', toggle);
      c.addEventListener('keydown', e => {
        if (e.key===' ' || e.key==='Enter') { e.preventDefault(); toggle(e); }
      });
    });

    $view.querySelectorAll('.btabs').forEach(tabsEl => {
      const tabs = tabsEl.querySelectorAll('.btab');
      const det = tabsEl.closest('.sdet');
      tabs.forEach(tab => {
        tab.addEventListener('click', e => {
          e.stopPropagation();
          tabs.forEach(t => t.classList.toggle('on', t === tab));
          det.querySelectorAll('.bbody').forEach(b =>
            b.classList.toggle('on', b.dataset.br === tab.dataset.br));
        });
      });
    });

    const timers = [];
    $view.querySelectorAll('.tw').forEach(w => {
      const total = parseInt(w.dataset.sec, 10);
      const disp = w.querySelector('.tdisp');
      const bS = w.querySelector('.tm-s'), bP = w.querySelector('.tm-p'), bR = w.querySelector('.tm-r');
      let rem = total, iv = null, running = false;
      const render = () => { disp.textContent = fmt(Math.max(0, rem)); };
      const tick = () => {
        if (rem > 0) { rem--; render(); }
        else {
          clearInterval(iv); iv = null; running = false;
          w.classList.remove('run'); w.classList.add('fin');
          bS.disabled = true; bP.disabled = true; bR.disabled = false;
          if (navigator.vibrate) navigator.vibrate([120,60,120]);
        }
      };
      bS.addEventListener('click', e => {
        e.stopPropagation();
        if (running || rem <= 0) return;
        running = true;
        w.classList.add('run'); w.classList.remove('fin');
        iv = setInterval(tick, 1000);
        bS.disabled = true; bP.disabled = false; bR.disabled = false;
      });
      bP.addEventListener('click', e => {
        e.stopPropagation();
        if (!running) return;
        running = false; clearInterval(iv);
        w.classList.remove('run');
        bS.disabled = false; bP.disabled = true;
      });
      bR.addEventListener('click', e => {
        e.stopPropagation();
        clearInterval(iv); running = false; rem = total;
        w.classList.remove('run','fin'); render();
        bS.disabled = false; bP.disabled = true; bR.disabled = true;
      });
      timers.push({ reset: () => bR.click() });
      render();
    });

    const btnReset = document.getElementById('btnReset');
    if (btnReset) btnReset.addEventListener('click', () => {
      $view.querySelectorAll('.schk').forEach(c => {
        c.classList.remove('on'); c.setAttribute('aria-checked','false');
        c.closest('.step').classList.remove('done');
      });
      timers.forEach(t => t.reset());
      updProg();
    });

    const btnExp = document.getElementById('btnExp');
    if (btnExp) {
      let allOpen = false;
      btnExp.addEventListener('click', () => {
        allOpen = !allOpen;
        $view.querySelectorAll('.step').forEach(s => s.classList.toggle('open', allOpen));
        btnExp.textContent = allOpen ? '全部收合' : '全部展開';
      });
    }
    updProg();
  }

  window.copyServiceTemplate = function(id, btn) {
    const tmpl = SERVICE_HISTORY_TEMPLATES.find(t => t.id === id);
    if (!tmpl) return;
    navigator.clipboard.writeText(tmpl.body).then(() => {
      btn.textContent = '✓ 已複製,貼到預約系統再改欄位';

    });
  };

  /* ====== CONSULTATION TECHNIQUE (面診技巧) ====== */
  const CT_HTML = `<details class="ct-chapter" open><summary class="ct-summary">一、診前心理建設(先建立「自己」的信心)<span class="ct-arrow">▾</span></summary><div class="ct-body">
<blockquote>
<p>客人會讀到你的狀態。你畏縮、怕說錯、怕客人不信,客人就更沒信心。面診前,先把自己立起來。整體氛圍要<strong>專業 + 有趣、摒棄銷售感</strong>,讓客人在輕鬆愉悅下成交。</p>
</blockquote>
<h3>1. 職業願景 / 個人 IP</h3>
<ul>
<li>記得自己入行的那份願景,用自己的話、形象、行為表現出來,別埋在心底做著做著就忘了。</li>
<li>我們是「美的引領者」,在做一件<strong>改變別人人生</strong>的事:改善肌膚與外貌問題 → 客人更有自信 → 人生更順。</li>
<li>除了外在,也提供<strong>情緒價值</strong>:讓客人感覺自己美好、有感知幸福的能力,心靈和外在都被好好對待。</li>
</ul>
<h3>2. 建立信任 —— 信任公式</h3>
<p><strong>信任 =(可信度 × 可靠度 × 親密度)÷ 自私度</strong></p>
<table>
<thead>
<tr>
<th>指標</th>
<th>意思</th>
<th>怎麼提升</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>可信度</strong>(正)</td>
<td>客人信不信你<strong>有能力</strong>解決他的問題</td>
<td>專業度:講得出專業術語、專業方案</td>
</tr>
<tr>
<td><strong>可靠度</strong>(正)</td>
<td>你能不能把嘴上講的<strong>落實</strong>出效果</td>
<td>談吐真誠、執行力、把專業落實到項目操作與搭配</td>
</tr>
<tr>
<td><strong>親密度</strong>(正)</td>
<td>你跟客人<strong>熟不熟</strong>、私交近不近</td>
<td><strong>自我揭示</strong>(見下)</td>
</tr>
<tr>
<td><strong>自私度</strong>(負,當分母)</td>
<td>你給人的印象<strong>是不是只為自己牟利</strong></td>
<td><strong>利他思維</strong>(見下)</td>
</tr>
</tbody>
</table>
<p><strong>親密度的關鍵:自我揭示</strong><br />
- 我們常犯的錯:一直問客人問題(皮膚、隱私),自己卻不講自己的事——這反了。<br />
- 人對「認識越久、了解越多」的人越信任;對陌生人最不信任。<strong>想讓客人信任你,就讓他多知道你的事</strong>。<br />
- 做法:從皮膚話題切入,聊著就帶入自己的生活(客人說熬夜,你也聊你怎麼熬)、最近做什麼、學什麼…。你攤開,他也會攤開,黏著度就上來。<br />
- 實操:高階客人進房都多聊 10–15 分鐘,聊彼此最近發生的事——「客情好」的祕訣就是<strong>互相了解近況</strong>。</p>
<p><strong>自私度的關鍵:利他思維</strong><br />
- 客人能真實感覺到你是不是真心想幫他解決問題。<br />
- 利他=不只推院內項目:也談身體健康、內源/外源調理、作息、家庭護理;需要時甚至推薦醫美、院內沒有的項目;提供情緒價值(別讓他為肌膚問題過度焦慮,焦慮反而更糟)。<br />
- 站客人角度、講性價比:「護理若問題不嚴重,是經濟允許下的<strong>錦上添花</strong>;預算夠就對自己好一點,預算緊就挑最剛需的」——客人反而更信你。</p>
<hr />
</div></details>
<details class="ct-chapter"><summary class="ct-summary">二、破冰三招(面診前先破冰,別一進來就是銷售味)<span class="ct-arrow">▾</span></summary><div class="ct-body">
<ol>
<li><strong>180 度路過</strong>:所有服務/銷售人員第一次見到客人就<strong>微笑打招呼</strong>。等到面診區就等於「第二次見面=熟人」,氛圍完全不同。全店每個人每次都跟客人打招呼——萬一原美容師離職/沒空換人接手,也不尷尬。</li>
<li><strong>細節讚美</strong>:別泛泛誇「你今天好漂亮」(客人知道你在套近乎)。<strong>把細節放大</strong>:「你脖子線條和肩膀好好看,有在練皮拉提斯嗎?」「你衣服低飽和度的顏色好清爽、很襯膚色」「你頭髮漂這麼淺光澤還這麼好、像緞面一樣」——具體才顯真心。(實例:誇一個新客頭髮,她坐著分享了 15 分鐘,面診就聊得很愉快。)</li>
<li><strong>讓客戶幫你一個小忙</strong>(富蘭克林效應):人更在意<strong>自己付出</strong>的幫忙,而不是別人給的。熟客可幫大忙,初見就請舉手之勞——「你的護髮這麼好,可以推薦你的髮膜/發個連結給我嗎?」問到他的興趣點,他很樂意幫,關係瞬間拉近,後面面診信任度更高。</li>
</ol>
<blockquote>
<p>核心心法:面診前一定用破冰;<strong>減少銷售味、增加人情味</strong>,客人才願意聽你說話。</p>
</blockquote>
<hr />
</div></details>
<details class="ct-chapter"><summary class="ct-summary">三、面診流程:先問診,後檢測(順序很重要)<span class="ct-arrow">▾</span></summary><div class="ct-body">
<h3>為什麼「先問診、後檢測」?</h3>
<ul>
<li>很多門店一進來就照皮膚檢測儀 → 客人在別處做過、很煩、只想快點做護理 → 因為信任還沒建立,一上來就是重銷售感的東西。客人都知道「照檢測=等下要坐下來聽你推方案」,信任沒建起來自然抗拒。</li>
<li>正確順序:<strong>先問診</strong>(判斷問題、也是建立專業信任的第一步)→ 治療理念 → 再檢測。</li>
</ul>
<blockquote>
<p>💡 <strong>肌·癒實際動線對照</strong>:新客一進來會先拍皮膚檢測(建檔用),但<strong>不先講結果</strong>——先完成問診,最後才帶客人看報告、驗證問診的猜想。精神一樣是「先問診、後講檢測」。</p>
</blockquote>
<h3>問診 = 把自己當醫生</h3>
<ul>
<li>醫生會先問「哪裡不舒服」,不會一上來就開藥/叫你做 CT/抽血——那樣你會覺得他不專業、甚至懷疑他為了賺檢測費。客人對「一進門就照皮膚檢測」是同樣感覺。</li>
<li><strong>別問「你今天要做什麼項目」</strong>(客人潛意識會鎖定他原本要的那個項目,你後面講什麼都像在推銷);改問 <strong>「你今天有沒有哪裡的皮膚,想讓我幫你改善?」</strong>——把「項目認知」轉成「皮膚問題認知」。</li>
</ul>
<p><strong>項目 → 皮膚問題 的轉化(範例):</strong></p>
<table>
<thead>
<tr>
<th>客人說</th>
<th>你怎麼轉</th>
</tr>
</thead>
<tbody>
<tr>
<td>想做清潔</td>
<td>是<strong>看起來</strong>不乾淨(黑頭、暗沉)還是<strong>摸起來</strong>不乾淨(乾燥粗糙、閉口粉刺)?→ 各自延伸底層問題</td>
</tr>
<tr>
<td>想做補水</td>
<td>是<strong>補不進</strong>水(吸收差 = 代謝差)還是<strong>鎖不住</strong>水(屏障鎖水差 = 屏障受損)?</td>
</tr>
</tbody>
</table>
<blockquote>
<p>心法:不要跟著客人的思路走(他說做什麼你就介紹什麼項目);從他的問題<strong>轉化到皮膚根本問題</strong>,你談的就不是項目、而是專業。</p>
</blockquote>
<h3>問診三層(像醫生一路追問下去)</h3>
<ol>
<li><strong>問症狀</strong>:圍繞你判斷的根本問題,問對應症狀。判斷像敏感肌→問乾繃/發癢/曬到發燙/換季起小疹/生理期前後敏感度上升;痘肌→問出油/刺癢/紅腫痘 vs 粉刺/囊腫維持多久/留不留痘印痘坑;色素→問斑長多久、會不會變深變淺、家族遺傳史。<strong>問得越細 = 把控度越高 = 客人越安心</strong>(對症下藥)。</li>
<li><strong>問病因</strong>:先<strong>內源</strong>(壓力、情緒穩定度、生理期、熬夜、高油高糖乳製品、吃辣),再<strong>外源</strong>(換季、換環境出差、在家換了保養品)。順便看出他的生活/家庭/工作狀態(方便後面同頻),也能當場指出他哪些習慣在傷皮膚、後面要改。</li>
<li><strong>問治療史</strong>(問題肌一定要問):之前做過什麼治療/護理、在醫院用過什麼藥。<strong>第一要務:排除類固醇使用史</strong>(痘、斑尤其重要),對後續護理影響很大;同時看出客人對光電/破皮項目的接受度——做過脈衝光/中胚/水光=能接受→方案可直接往高階配,不用第一次只給基礎方案、後面難升單。</li>
</ol>
<h3>望聞問切(問診的完整動作)</h3>
<ul>
<li><strong>望</strong>:看皮膚質感(泛紅、斑點、紋理、粗糙、乾紋細紋、毛孔),也看<strong>精神狀態</strong>(能反映思維方式與消費習慣)。</li>
<li><strong>聞</strong>:多聽客人自述,用問句互動(「你知道這問題是什麼造成的嗎?」)激發他表達;他答完先<strong>肯定</strong>(「你認知不錯」)再補上專業解答(「不過有一點小片面…」)。</li>
<li><strong>問</strong>:如上三層。</li>
<li><strong>切</strong>:觸摸皮膚手感(皮下有無增生/結節、光滑度、緊實度、彈性)。<strong>摸臉前一定當著客人面做手部消毒</strong>——很多人不喜歡別人碰臉。</li>
</ul>
<h3>問診表:面診師幫客人填,別丟給客人自己填</h3>
<ul>
<li>像看病的病歷是醫生填的、不是你自己寫。面診師拿著表、依客人說的用專業方式幫他填,顯得專業;直接丟給客人填=像例行公事的麻煩事,專業感低。</li>
</ul>
<h3>治療理念傳達(檢測前穿插):治症 → 治根 → 治本</h3>
<blockquote>
<p>填完表、總結完問題後,傳達護理理念。日式皮膚管理理念接近中醫,分三階段:</p>
</blockquote>
<ul>
<li><strong>治症</strong>:先處理客人焦慮的表象症狀(有痘治痘、有紅退紅、有斑做斑)——他就是為這個來的,一定要先幫他處理。</li>
<li><strong>治根</strong>:治症狀背後的皮膚根本問題(泛紅是因為底層炎症/屏障受損)→ 從根本改善,皮膚才穩定、不易反覆。</li>
<li><strong>治本</strong>:所有問題都跟生活習慣、護理習慣、身體狀態有關 → 最深層改善本源(作息、精神、護理習慣),長期不反覆。</li>
<li>好處:客人有安全感(你不只治表層)+ 跟客人<strong>站同一戰線</strong>(共同目標=更健康、更開心),黏著度更高。</li>
</ul>
<h3>皮膚檢測(放最後,把問題「可視化」)</h3>
<ul>
<li>前面已把基礎資訊與皮膚問題聊清楚,檢測是為了把問題<strong>可視化</strong>、讓客人看懂,也判斷底層炎症的嚴重度/區域、斑點表層 vs 底層量。</li>
<li><strong>別按部就班把所有照片都講</strong>(客人在別處聽過會很不耐煩)。先問「你以前做過皮膚檢測嗎?」做過 → 只挑重點幾張剖析,其他帶過。</li>
<li>健康/清潔為主的客人:測皮脂(T 字 U 字較多)、卟啉。</li>
<li>痘肌:測皮脂(通常旺盛)+ 卟啉(看微環境、菌群爆發區);卟啉高的那側,皮膚穩定度通常較低。做完清潔後可再拍一次讓客人對比下降。</li>
</ul>
<p><strong>各板塊怎麼判讀(把問診的猜想「驗證」給客人看):</strong><br />
- <strong>炎症</strong>:看紅色圖/紅區圖——正常皮膚偏藍,敏感區偏綠(微微升高),明顯發炎區偏紅(溫度升高)。一眼看出發炎的位置與嚴重度。<br />
- <strong>色素</strong>:看色素圖——表層有色素反應的地方,底層色素量通常更大(炎症型色沉或斑點都是)。<strong>可藉此先跟客人講清楚「反黑」:底層本來就有色素,治療促進代謝、色素會先浮到表面,這是必然現象,之後會再慢慢代謝掉</strong>——先講,客人後面看到浮色就不會怪你。<br />
- <strong>衰老</strong>:看紋理——衰老可能出現「斷裂的紋理」(不只乾紋),要<strong>提前講明這種斷裂紋普通護理改善不了、需要醫美打針</strong>,別過度承諾。<br />
- <strong>含水量</strong>:水分直接影響膠原含量,一定要測。<br />
- 核心:<strong>皮膚檢測是拿來「驗證問診的猜想」</strong>,一定是先有根本成因判斷,再用檢測去篩選佐證,不是照了再瞎解讀。</p>
<blockquote>
<p>⚠️【專業知識更正】<strong>卟啉(Porphyrin)</strong> 是皮膚檢測儀在 UV 下看到的螢光小點,它是<strong>細菌(主要是痤瘡桿菌)的代謝產物,不是「真菌排泄物」</strong>。卟啉強度反映痤瘡桿菌密度、對應痘痘嚴重程度;急性脂漏、痤瘡明顯、出油量大的人卟啉通常較高。</p>
</blockquote>
<hr />
</div></details>
<details class="ct-chapter"><summary class="ct-summary">四、開方案:從總結問題到階段性方案<span class="ct-arrow">▾</span></summary><div class="ct-body">
<h3>4.1 先歸納:所有表象問題 → 四大根本問題</h3>
<blockquote>
<p>用問診表最後附一張白紙打草稿,把客人的現況問題寫出來、標出主要問題。皮膚表象再多,歸到根本就這四類:</p>
</blockquote>
<table>
<thead>
<tr>
<th>表象問題</th>
<th>根本問題</th>
</tr>
</thead>
<tbody>
<tr>
<td>痘痘、粉刺、閉口、角質堵塞</td>
<td><strong>炎症</strong>(底層炎症)</td>
</tr>
<tr>
<td>暗沉、色沉、斑點、色素堆積</td>
<td><strong>色素</strong>(色素活性/代謝)</td>
</tr>
<tr>
<td>乾燥粗糙、敏感刺痛、缺水</td>
<td><strong>屏障</strong>(屏障受損、鎖不住水)</td>
</tr>
<tr>
<td>毛孔、細紋、鬆弛</td>
<td><strong>衰老</strong>(彈性缺失/膠原流失)</td>
</tr>
</tbody>
</table>
<p>依表象篩出他最主要的 1–2 個根本問題(例:痘肌 = 炎症 + 屏障),再做方案。</p>
<h3>4.2 判斷主次訴求:主要給「詳細思路」,次要「講明必要性」</h3>
<ul>
<li>客人臉上通常不只一個問題。聊天中感知他<strong>最在意的點(主要訴求)</strong>,先針對最剛需的做詳細思路。</li>
<li>例:又是痘肌又是敏感肌,痘比較嚴重(影響美觀最大)→ 先按痘的炎症思路做詳細方案。</li>
<li><strong>次要問題不是不講</strong>——第一次方案要開得越完整越好。屏障、色素、抗衰也要講到,重點放主要問題、次要問題<strong>講明必要性</strong>:「你現在處理痘痘,但屏障沒跟上,痘會一直反覆,所以屏障雖然排下一階段,對你一樣重要。」</li>
</ul>
<h3>4.3 先給「治療思路」,再給「治療方案」(降銷售感的關鍵)</h3>
<ul>
<li><strong>治療思路</strong>=純從皮膚科學角度講怎麼解決,<strong>完全不提任何項目、產品、店裡做什麼</strong>——沒有銷售性質,是最好的專業輸出。</li>
<li>客人認可你的思路(覺得專業)後,再把思路<strong>延伸成結合門店項目的方案</strong>,信任感高、銷售感低很多。</li>
<li>反例:客人說要治痘,你馬上「我們店這幾個項目適合你」開始介紹項目 → 銷售感很強。<strong>先思路、後方案</strong>。</li>
</ul>
<h3>4.4 階段性方案:治療期 → 穩定期</h3>
<ul>
<li><strong>治療期(治症)</strong>:光電 + 中胚 + 效果顯著的項目,處理表象問題。約 3 個月。</li>
<li><strong>穩定期(治本)</strong>:改善皮膚機能、整體厚度、屏障穩定度,讓前面的改善更長久。約 3 個月。</li>
<li>合計約 <strong>6 個月</strong>,方案怎麼組合由店長定,員工照方案執行、跟客人講清楚每階段做什麼、為什麼這樣安排。</li>
</ul>
<h3>4.5 搭配聯合治療</h3>
<ul>
<li>懂不同產品/方式/問題怎麼搭、順序怎麼排(對照肌·癒〈肌膚處理順序〉+〈聯合治療〉SOP)。</li>
</ul>
</div></details>
<details class="ct-chapter"><summary class="ct-summary">五、案例:用故事,不只用對比圖<span class="ct-arrow">▾</span></summary><div class="ct-body">
<ul>
<li>前面講很多會把客人講到一頭霧水,這時拿<strong>具象化的案例</strong>。找<strong>皮膚情況、治療思路跟他相近</strong>的案例才有參考價值。</li>
<li>放 iPad,面診時直接看。<strong>面診前一定先熟這些案例</strong>——不能只打開一張圖,要把圖背後的<strong>故事</strong>講清楚,才有共情與真實感。</li>
<li>講故事帶情緒:「這位客人剛來跟你很像,在醫院做過 2–3 個月玫瑰斑治療覺得沒明顯效果、很焦慮,朋友推薦來我這;我幫他做了某某方案(跟你很像),兩個月後…三個月後…半年後…」給階段性對比。再說「你的情況跟他很像,可以參考他的方案與對比」。</li>
<li><strong>一個真實案例故事,勝過十張單純的對比圖</strong>,更可信、更打動人。</li>
</ul>
<hr />
</div></details>
<details class="ct-chapter"><summary class="ct-summary">六、成交環節(心態四要點)<span class="ct-arrow">▾</span></summary><div class="ct-body">
<ol>
<li><strong>不是「賣東西」,是「和客人一起買」</strong>:當客人的閨蜜,站他的角度幫他選真正適合的方案——同一戰線。</li>
<li><strong>讓客人自己說要買</strong>:每個總結節點都給他一個「肯定」的機會——「你認不認可我的方案?認不認可我的專業?願不願意配合我一起達到你要的皮膚狀態?」讓他親口說出「願意/認可」。人更重視自己說出口的結論。</li>
<li><strong>合作關係,不是買賣關係</strong>:我做你的服務,你也向我要更好的效果,<strong>完全平等</strong>。強調客人要配合、一起朝更健康更美的共同目標努力。心態擺正,下次邀約就不卑微,客人更尊重、更願意跟隨你。</li>
<li><strong>購買是理性 + 感性</strong>:感性客人容易衝動消費——但大部分人冷靜後會理性思考,所以要給足<strong>理論支撐與專業輸出</strong>(案例、專業知識、專業方案)讓他理性也認可。對太衝動的客人,付錢前反而<strong>勸他理性</strong>:「你要想清楚、下定決心要改善,別今天付了回去我叫你你不來;開始了就別隨便放棄。」——換來更高的配合度、更好的效果、更少客訴退款。</li>
</ol>
<blockquote>
<p><strong>面對壓價的原則</strong>:輕聲有禮回應「這是我們店的統一價、性價比高、專業配得上」,<strong>不要主動許諾折扣</strong>。客人堅持要優惠 → 請示店長判斷,不要自己臨場答應。</p>
</blockquote>
<hr />
</div></details>
<details class="ct-chapter"><summary class="ct-summary">七、成交流程:讓客人親口認可<span class="ct-arrow">▾</span></summary><div class="ct-body">
<h3>7.1 執行動作</h3>
<ol>
<li><strong>求方案認可</strong>:讓客人<strong>親口說</strong>「我認可你的方案/專業」,並說出他的預期與<strong>剛需</strong>。</li>
<li><strong>把剛需再細講一遍</strong>:針對他自己認知裡最重要的剛需,單獨拿出來細講,徵求他意見「想不想跟我一起實施這個完美方案」。</li>
<li><strong>以退為進</strong>:「有多少錢就解決多少問題」,不逼他買整個方案;從初期剛需開始,一份錢解決一份問題。</li>
<li><strong>報方案時給二選一</strong>:店裡的方案基本結構是「入門版 vs 完整版」,客人從「買不買」變成「選 A 還是選 B」,更容易成交。<strong>選哪個都好,重點是他留下來、進入循環護理</strong>。</li>
</ol>
<h3>7.2 答疑:同意且消解(絕不否定客人)</h3>
<ul>
<li>客人提問題(如「有點貴」),<strong>先聽完、先同意、再消解</strong>,不要一句「不貴啊」把你們推到對立面。</li>
<li>範例:「確實我們價格不便宜,很多客人也說貴——但我們的性價比高:用的產品跟儀器是市面上排得上前段的好東西,我天天鑽研皮膚專業、能給你多於預期的效果,很多人大老遠來找我做諮詢,專業配得上這個價。」→ 同意+消解反而讓信任更高。</li>
</ul>
<h3>7.3 敢報價、要自信</h3>
<ul>
<li>別覺得自己貴。東西好、效果好、專業配得上價格,報價時就理直氣壯。</li>
<li><strong>不要主動送優惠或降價</strong>——優惠、加贈、次數調整這些屬於方案調整層級,遇到客人堅持要 → 請示店長判斷。</li>
<li>跟「加值贈送 SOP」不衝突:加值贈送是<strong>送小服務、不動價格</strong>,A 級內(50 元以下)員工可自行決定;<strong>動到價格</strong>(折扣/降價/送堂數)才需要請示店長。</li>
</ul>
<hr />
</div></details>
<details class="ct-chapter"><summary class="ct-summary">八、售後跟蹤與客情經營(續單的關鍵)<span class="ct-arrow">▾</span></summary><div class="ct-body">
<blockquote>
<p>「動不動開大單」的祕訣就是<strong>客情</strong>——沒什麼大邏輯,都是小細節。</p>
</blockquote>
<h3>護理中/每次</h3>
<ul>
<li><strong>服務小記</strong>:系統(預約系統服務歷程)記錄皮膚護理前後狀態、這次做了什麼項目、下次可能的方向,用文字留痕。</li>
<li><strong>前後對比照</strong>:每次拍,讓客人養成記錄習慣;1/3/6 個月做對比圖,他看到變化更有信心堅持。</li>
</ul>
<h3>付款後(休息區聊天,3 個動作)</h3>
<blockquote>
<p>付款當下是<strong>信任感最高</strong>的時候,要維繫下去。<br />
1. <strong>讓他堅信今天的選擇正確</strong>:真誠感謝他把皮膚交給你、願意配合接下來的計畫(用肢體語言+口頭都行)。<br />
2. <strong>給長期護理的信心/正能量</strong>:「保持愉悅、別壓力太大,你皮膚沒你想的嚴重,過度焦慮反而更糟;你已經很漂亮,做護理是為了看到更好的自己。」院內也及時給正向反饋、看改善對比圖,放大他的護理快感、消除焦慮。<br />
3. <strong>定期回訪邀約</strong>:護理後 2–3 天問有沒有不良反應/不舒服;一週左右問效果(透亮度、水潤度有沒有變好)給正向反饋;接著邀約下次護理的時間與類型。</p>
</blockquote>
<h3>再到店:從事實出發的讚美</h3>
<ul>
<li>拿 1–3 個月的對比圖,<strong>針對事實</strong>讚美(別浮誇)。例:別說「做了鎮定消炎臉變小了」;要說「你皮膚透亮度變好、質感變好、痘痘愈合週期比以前快、紅退了、炎症色沉淡了很多,正往好方向發展」。</li>
</ul>
<h3>好轉反應要提前講</h3>
<ul>
<li>痘肌/炎症肌短期可能出現<strong>好轉反應(赫氏反應/爆痘期)</strong>,大面積冒粉刺,很多人這階段撐不下去。要<strong>提前告知</strong>,並在每階段分析變化(好或壞都講、不逃避):這段變差的原因、要調整什麼、下階段做什麼。客人就知道每一步在做什麼、為什麼變化,不會半途放棄。(對客可直接講「代謝反應/爆痘期」,不用堅持術語。)</li>
</ul>
<h3>讓客人養成「先找自己原因」的習慣</h3>
<ul>
<li>持續做階段性規劃與總結,客人會養成主動反饋的習慣:「我最近壓力大/飲食沒控好,皮膚不太穩定」,甚至自責「不好意思這陣子沒按時來」。好反饋→可當案例發社群;壞反饋→及時調方案。方案更高效、滿意度更高。</li>
</ul></div></details>
`;
